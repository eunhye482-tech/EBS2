<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (지식과 에너지 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem; /* 글자 크기 축소 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; /* 본문 글자 크기 축소 */
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 8px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "That may be so, but the food we eat today is the fruit of thousands of years of increasingly high-quality information.",
            parts: [
                "There’s a saying that “you can’t eat information.”",
                "This information includes the knowledge of how to farm—what seeds, what tools and how to use them.",
                "What we eat is solar energy, filtered, concentrated, and distilled through the lens of human knowledge.",
                "The energy the Earth receives from the sun each year has remained more or less constant through all of human civilization.",
                "What’s allowed us to flourish is our increasingly sophisticated knowledge of how to capture that energy.",
                "Every step in the advancement of our knowledge has brought an increase in the amount of energy we can tap into."
            ],
            answer: 1, // ②번 위치
            expl: "정보를 먹을 수 없다는 격언(①번 앞)에 대해 '그럴 수도 있지만(That may be so)'이라며 반박을 시작하는 ①번 뒤(②번 위치)가 정답입니다."
        },
        {
            box: "What we eat is solar energy, filtered, concentrated, and distilled through the lens of human knowledge.",
            parts: [
                "There’s a saying that “you can’t eat information.”",
                "Today’s food is the result of thousands of years of farming knowledge, including which seeds and tools to use.",
                "This knowledge acts as a tool to process the energy the Earth receives from the sun.",
                "The solar energy received each year has remained constant through human history.",
                "What’s allowed us to flourish is our sophisticated knowledge of how to capture that energy in a form that fuels our bodies.",
                "Every step in the advancement of our knowledge has brought an increase in the energy we can tap into."
            ],
            answer: 2, // ③번 위치
            expl: "농업 지식에 대한 설명(②번 앞)이 끝난 후, 우리가 먹는 음식을 '인간의 지식이라는 렌즈를 통해 걸러진 태양 에너지'라고 정의하는 ③번 위치가 가장 적절합니다."
        },
        {
            box: "What’s allowed us to flourish is our increasingly sophisticated knowledge of how to capture an ever-growing but still tiny fraction of that energy.",
            parts: [
                "What we eat is solar energy, filtered and distilled through the lens of human knowledge.",
                "The energy the Earth receives from the sun each year has remained more or less constant through all of human civilization.",
                "This consistency means that the total pool of energy available to the planet has not changed.",
                "Our ability to grow depends on our capacity to transform this constant supply into fuel for our bodies.",
                "Every step in the advancement of our knowledge has brought with it an increase in the amount of energy we can tap into.",
                "Ultimately, food and information are two sides of the same coin in human survival."
            ],
            answer: 4, // ⑤번 위치
            expl: "태양 에너지는 일정(②번 앞)하지만 우리가 번성할 수 있었던 이유는 그 에너지를 포착하는 '정교한 지식' 덕분이라는 흐름으로 이어지는 ⑤번 위치가 정답입니다."
        },
        {
            box: "This information includes the knowledge of what irrigation and what sequence of one crop after another on the same land to use.",
            parts: [
                "There’s a saying that “you can’t eat information.”",
                "However, the food we eat today is the fruit of thousands of years of increasingly high-quality information.",
                "It involves knowing what seeds, what tools and how to use them at what times of year.",
                "What we eat is solar energy, filtered and distilled through the lens of human knowledge.",
                "The energy the Earth receives from the sun each year has remained more or less constant.",
                "Every step in the advancement of our knowledge has brought an increase in the amount of energy we can tap into."
            ],
            answer: 3, // ④번 위치
            expl: "농업 지식(information)의 구체적인 예시들이 나열되는 과정(③번 앞)에 이어지는 추가적인 예시 문장으로, ④번 위치가 적절합니다."
        },
        {
            box: "Every step in the advancement of our knowledge has brought with it an increase in the amount of energy we can tap into.",
            parts: [
                "The energy the Earth receives from the sun each year has remained more or less constant.",
                "What we eat is this solar energy, filtered through human knowledge.",
                "What’s allowed us to flourish is our knowledge of how to capture an ever-growing fraction of that energy.",
                "This capture is only possible through a series of technical and intellectual breakthroughs.",
                "As we learn more, we unlock more of the sun's power to fuel our civilization.",
                "In this sense, the progress of humanity is the progress of our information gathering."
            ],
            answer: 4, // ⑤번 위치
            expl: "지식의 정교화가 에너지 포착을 가능하게 한다는 앞 문장들의 결론으로서, 지식의 발전이 곧 가용 에너지의 증가로 이어진다는 ⑤번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 지식의 렌즈를 잘 활용하셨네요. ☀️";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong');
            all[q.answer].classList.add('correct');
            res.innerText = "틀렸습니다. 논리적 단절을 다시 찾아보세요.";
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
