<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (운동과 감정 활용 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "An instructor also might use emotion to elicit greater effort from her students.",
            parts: [
                "The use of emotion may be important in exercise, particularly among exercise instructors.",
                "It has been established that exercise enjoyment is associated with increased exercise adherence.",
                "An instructor might aim to foster enjoyment in his participants as a means of increasing their program adherence.",
                "Cuing participants to feelings of anger and frustration during a cardio kickboxing class might lead to more effortful punches and stronger kicks.",
                "Conversely, a yoga instructor could use positive emotions such as compassion to get her students in the proper mindset.",
                "Evidently, there are a number of ways emotions could be used to enhance performance in sport and exercise."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "강사가 프로그램 지속(adherence)을 위해 즐거움을 활용한다는 내용(③번 앞) 뒤에, '또한(also)' 더 큰 노력(greater effort)을 이끌어내기 위해 감정을 사용할 수 있다는 내용을 도입하는 ④번 위치가 정답입니다. 뒤에 킥복싱 수업의 구체적인 '노력' 사례가 이어집니다."
        },
        {
            box: "Cuing participants to feelings of anger and frustration during a cardio kickboxing class might lead to more effortful punches and stronger kicks.",
            parts: [
                "The use of emotion is important in exercise. Instructors aim to foster enjoyment to increase program adherence.",
                "An instructor also might use emotion to elicit greater effort from her students.",
                "Conversely, a yoga instructor could use positive emotions or emotion-related states such as compassion to get her students in the proper mindset for their practice.",
                "Evidently, there are a number of ways emotions could be used to enhance performance in sport and exercise.",
                "Strategic emotional cuing can transform a routine workout into a powerful psychological experience.",
                "By matching the emotion to the activity, instructors maximize both physiological and psychological benefits."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "감정을 통해 더 큰 노력을 이끌어낼 수 있다는 일반적 진술(②번 앞) 뒤에, 킥복싱 수업에서 분노와 좌절감을 활용해 더 강한 펀치를 만든다는 구체적 예시를 드는 ③번 위치가 정답입니다."
        },
        {
            box: "Conversely, a yoga instructor could use positive emotions or emotion-related states such as compassion to get her students in the proper mindset for their practice.",
            parts: [
                "The use of emotion may be important in exercise, particularly among exercise instructors.",
                "An instructor might use emotion to elicit greater effort, such as using anger to lead to more effortful punches in kickboxing.",
                "Evidently, there are a number of ways emotions could be used to enhance performance in sport and exercise.",
                "This flexibility in application shows that emotional intelligence is a key asset for any fitness professional.",
                "Different modalities require different affective states to achieve optimal results.",
                "A calm, centered approach is as vital for yoga as intensity is for high-impact cardio."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "킥복싱에서의 강렬한 부정적 감정 활용 사례(②번 앞)와 대조적으로('Conversely'), 요가 강사가 연민과 같은 긍정적 감정을 사용하는 정반대의 사례를 제시하는 ③번 위치가 정답입니다."
        },
        {
            box: "An instructor might aim to foster enjoyment in his participants as a means of increasing their program adherence.",
            parts: [
                "The use of emotion may be important in exercise, particularly among exercise instructors.",
                "It has been established that exercise enjoyment is associated with increased exercise adherence.",
                "An instructor also might use emotion to elicit greater effort from her students.",
                "Cuing participants to feelings of anger during a cardio kickboxing class might lead to more effortful punches.",
                "Conversely, a yoga instructor could use positive emotions to get her students in the proper mindset.",
                "Evidently, there are a number of ways emotions could be used to enhance performance."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "즐거움이 운동 지속과 연관된다는 이론적 사실(②번 앞) 뒤에, 강사가 이를 위해 즐거움을 조성하려 한다는 구체적인 적용을 설명하는 ③번 위치가 정답입니다."
        },
        {
            box: "Evidently, there are a number of ways emotions could be used to enhance performance in sport and exercise.",
            parts: [
                "An instructor might use emotion to elicit greater effort from students or foster enjoyment for adherence.",
                "Kickboxing instructors use anger for stronger kicks, while yoga instructors use compassion for proper mindset.",
                "These varied techniques highlight the versatility of emotion as a coaching tool.",
                "Research into sports psychology continues to uncover new methods for affect regulation during physical activity.",
                "Understanding the interplay between heart and muscle is essential for modern coaching.",
                "Thus, the gym and the studio become laboratories for emotional and physical growth."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "앞서 제시된 여러 운동 종목(킥복싱, 요가 등)의 감정 활용 사례들(②번 앞)을 모두 아울러, '분명히(Evidently)' 감정이 스포츠 수행 능력을 향상시키는 다양한 방법이 존재한다는 결론을 맺는 ③번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 감정 조절 능력이 탁월하시네요. 🧘‍♂️";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>
