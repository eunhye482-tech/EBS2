<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (측정 정밀도 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "Precision is reflected in the number of digits in a measurement; the more digits this measurement has, the more precise it is.",
            parts: [
                "The most fundamental rule regarding the use of any measuring device is that the device should always be read to its optimum capability with regard to precision.",
                "For example, the measurement 345.2 inches is more precise than the measurement 345 inches.",
                "If it is possible to obtain the first digit to the right of the decimal point from a device, then that digit should be recorded.",
                "If it is possible to obtain the second digit to the right of a decimal point, then that digit should be recorded, and so on.",
                "Thus, a laboratory worker should endeavor to obtain the most digits possible from whatever device is being used.",
                "Consistent application of this rule ensures the reliability of experimental data."
            ],
            answer: 1, // ①번 뒤 (②번 위치)
            expl: "측정 장치를 최적의 능력으로 읽어야 한다는 원칙(①번 뒤)을 제시한 후, '정밀도(Precision)'의 정의가 숫자의 개수와 관련이 있음을 설명하는 ②번 위치가 정답입니다. 뒤의 345.2와 345의 예시가 이를 구체화합니다."
        },
        {
            box: "For example, the measurement 345.2 inches is more precise than the measurement 345 inches.",
            parts: [
                "The device should always be read to its optimum capability with regard to precision.",
                "Precision is reflected in the number of digits in a measurement; the more digits it has, the more precise it is.",
                "If it is possible to obtain the first digit to the right of the decimal point from a device, then that digit should be recorded.",
                "If it is possible to obtain the second digit to the right of a decimal point, then that digit should be recorded.",
                "Thus, a laboratory worker should endeavor to obtain the most digits possible from whatever device is being used.",
                "This practice minimizes uncertainty in scientific observations."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "숫자가 많을수록 더 정밀하다는 일반적 원리(②번 앞)에 대해, 구체적으로 소수점이 있는 숫자와 없는 숫자를 비교하는 '예시(For example)'를 제시하는 ③번 위치가 정답입니다."
        },
        {
            box: "If it is possible to obtain the first digit to the right of the decimal point from a device, then that digit should be recorded.",
            parts: [
                "Precision is reflected in the number of digits; the more digits, the more precise it is.",
                "The measurement 345.2 inches is more precise than the measurement 345 inches.",
                "If it is possible to obtain the second digit to the right of a decimal point, then that digit should be recorded, and so on.",
                "Thus, a laboratory worker should endeavor to obtain the most digits possible from whatever device is being used whether it is digital or nondigital.",
                "Precision must be maintained regardless of the tool's interface.",
                "Recording fewer digits than the device allows is a failure to meet professional standards."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "예시를 통해 숫자의 중요성을 보여준 뒤(②번 앞), 소수점 첫 번째 자리부터 기록해야 한다는 구체적인 지침을 시작하는 ③번 위치가 정답입니다. 뒤의 'second digit' 설명과 논리적 순서를 이룹니다."
        },
        {
            box: "Thus, a laboratory worker should endeavor to obtain the most digits possible from whatever device is being used whether it is digital or nondigital.",
            parts: [
                "Precision is reflected in the number of digits in a measurement.",
                "The measurement 345.2 inches is more precise than the measurement 345 inches.",
                "If it is possible to obtain the first or second digit to the right of the decimal point, those digits should be recorded.",
                "Precision remains a key factor in the validity of any quantitative analysis.",
                "A meticulous approach to data collection prevents downstream errors in calculation.",
                "High-precision instruments are only useful if the user records their output correctly."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "소수점 자리수를 최대한 확보하여 기록해야 한다는 앞선 지침들(③번 앞)을 요약하며, 실험실 연구원이 가져야 할 최종적인 자세와 결론을 내리는 ④번 위치가 적합합니다."
        },
        {
            box: "If it is possible to obtain the second digit to the right of a decimal point, then that digit should be recorded, and so on.",
            parts: [
                "Precision is reflected in the number of digits; the more digits, the more precise it is.",
                "For example, 345.2 inches is more precise than 345 inches.",
                "If it is possible to obtain the first digit to the right of the decimal point, that digit should be recorded.",
                "Thus, a laboratory worker should endeavor to obtain the most digits possible.",
                "This iterative process of recording digits ensures maximum information density.",
                "Every additional digit captured represents a more refined understanding of the physical quantity."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "소수점 첫 번째 자리를 기록하라는 문장(③번 앞)에 이어, '두 번째 자리(second digit)'와 그 이상의 자리수들을 기록하라는 확장된 지침을 제시하는 ④번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 측정의 정밀함을 완벽히 포착하셨네요. 📏";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 고른 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 번호 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
