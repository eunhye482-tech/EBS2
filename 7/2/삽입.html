<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (소련과 음료 회사 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "Indeed, one government official dismissed the product as a “useless drink.”",
            parts: [
                "In the old Soviet Union, a famous U.S. beverage company wanted to set up a bottling plant and distribution network.",
                "The prevailing ideology in the old Soviet Union at the time stressed the importance of the group over the individual and the need to develop industrial capacity at the expense of consumer goods.",
                "Soft drinks hardly seemed to fit the country’s ideological priorities.",
                "Eventually, the two sides struck a deal, but not on the basis that the drink would quench the local population’s thirst.",
                "Instead, the U.S. negotiators justified the project on the grounds that it would contribute to the country’s industrial development.",
                "They restructured the project to include a heavy training component for local workers and managers."
            ],
            answer: 2, // ③번 위치
            expl: "음료가 국가의 이데올로기적 우선순위와 맞지 않는다는 설명(②번 앞)에 이어, 구체적으로 정부 관료가 이를 '쓸모없는 음료'라고 일축했다는 ②번 뒤(③번 위치)가 정답입니다."
        },
        {
            box: "Instead, the U.S. negotiators justified the project on the grounds that it would contribute to the country’s industrial development.",
            parts: [
                "In the old Soviet Union, soft drinks hardly seemed to fit the country’s ideological priorities.",
                "Indeed, one government official dismissed the product as a “useless drink.”",
                "Eventually, the two sides struck a deal, but not on the basis that the drink would quench the local population’s thirst.",
                "They restructured the project to include a heavy training component for local workers and managers, as well as a farm that would grow certain of the drink’s ingredients.",
                "In addition, the company promised to make efforts to persuade other American companies to consider investments.",
                "This strategic alignment allowed the company to overcome the ideological barriers of the time."
            ],
            answer: 2, // ③번 위치
            expl: "단순히 갈증을 해소하는 용도가 아닌 다른 근거로 합의에 도달했다는 내용(②번 앞) 뒤에, '대신에(Instead)' 산업 발전에 기여한다는 근거를 제시하는 ③번 위치가 정답입니다."
        },
        {
            box: "They restructured the project to include a heavy training component for local workers and managers, as well as a farm that would grow certain of the drink’s ingredients.",
            parts: [
                "Soft drinks hardly seemed to fit the country’s ideological priorities in the old Soviet Union.",
                "Eventually, the two sides struck a deal based on the grounds that it would contribute to industrial development.",
                "Instead of focusing on consumption, the project was framed as a means to enhance the nation's productive capacity.",
                "In addition, the company promised to make efforts to persuade other American companies to consider investments in the country.",
                "These efforts were aimed at fostering long-term economic cooperation between the two nations.",
                "By doing so, the beverage company successfully integrated its operations into the Soviet system."
            ],
            answer: 2, // ③번 위치
            expl: "산업 발전에 기여한다는 근거를 제시했다는 설명(②번 앞) 뒤에, 이를 실천하기 위해 프로젝트를 어떻게 '재구조화(restructured)'했는지 구체적인 조치를 설명하는 ③번 위치가 정답입니다."
        },
        {
            box: "In addition, the company promised to make efforts to persuade other American companies to consider investments in the country.",
            parts: [
                "The U.S. negotiators justified the project on the grounds that it would contribute to the country’s industrial development.",
                "They restructured the project to include a heavy training component for local workers and managers.",
                "A farm was also established to grow certain of the drink’s ingredients locally.",
                "These various commitments demonstrated the company's long-term interest in the Soviet market.",
                "The project eventually served as a bridge for further international business relations.",
                "The beverage company's entry marked a significant shift in the country's economic landscape."
            ],
            answer: 2, // ③번 위치
            expl: "프로젝트의 산업적 기여를 위한 내부적인 노력들(②번 앞)에 더해, '추가적으로(In addition)' 다른 미국 기업들의 투자를 설득하겠다는 외부적 노력을 덧붙이는 ③번 위치가 적절합니다."
        },
        {
            box: "Eventually, the two sides struck a deal, but not on the basis that the drink would quench the local population’s thirst.",
            parts: [
                "The prevailing ideology in the old Soviet Union stressed the importance of the group over the individual.",
                "Soft drinks hardly seemed to fit the country’s ideological priorities, and one official dismissed it as useless.",
                "Instead, the U.S. negotiators justified the project on the grounds that it would contribute to the country’s industrial development.",
                "They restructured the project to include a heavy training component for local workers and managers.",
                "In addition, the company promised to make efforts to persuade other American companies to invest.",
                "The successful negotiation highlighted the importance of cultural and political sensitivity in international trade."
            ],
            answer: 1, // ②번 위치
            expl: "음료가 무시당하던 부정적인 상황(①번 앞)에서 극적으로 '결국(Eventually)' 합의를 보게 되었음을 나타내며, 그 합의의 독특한 근거를 소개하기 시작하는 ②번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 비즈니스 협상 전략을 잘 파악하셨네요. 🥤";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
