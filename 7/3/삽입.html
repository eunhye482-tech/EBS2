<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (건축 설계와 드로잉 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "Researchers term this phenomenon “premature fixation” and trace its cause to the disincentive for design changes in CAD models.",
            parts: [
                "In 2012, the Yale School of Architecture held a symposium called “Is Drawing Dead?” reflecting a sense that freehand sketch is being displaced by computers.",
                "Many architects believe this transition entails a loss of creativity and adventurousness.",
                "Thanks to screen renderings, a designer working at a computer has a tendency to lock in, visually and cognitively, on a design at an early stage.",
                "He bypasses much of the reflective and exploratory playfulness that springs from the uncertainty and ambiguity of sketching.",
                "The designer at the computer also tends to emphasize formal experimentation at the expense of expressiveness.",
                "CAD software produces designs that often lack the emotional content of a design derived from hand."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "컴퓨터 작업자가 조기에 디자인을 확정해버리고(lock in) 탐구적인 유희를 건너뛴다는 내용(③번 앞) 뒤에, 연구자들이 이 현상을 '조기 고착(premature fixation)'이라 부른다는 설명이 오는 ④번 위치가 정답입니다."
        },
        {
            box: "He bypasses much of the reflective and exploratory playfulness that springs from the uncertainty and ambiguity of sketching.",
            parts: [
                "In 2012, a symposium asked if drawing was dead, reflecting the displacement of sketches by computers.",
                "A designer working at a computer has a tendency to lock in on a design at an early stage due to the precision of screen renderings.",
                "Researchers term this phenomenon “premature fixation” and trace its cause to the disincentive for design changes built too quickly into a CAD model.",
                "The designer at the computer also tends to emphasize formal experimentation at the expense of expressiveness.",
                "By weakening an architect’s personal connection with the work, CAD software produces complex but emotionally lacking designs.",
                "Ultimately, the shift toward digital tools redefines the role of human intuition in the creative process."
            ],
            answer: 1, // ①번 뒤 (②번 위치)
            expl: "디자이너가 초기 단계에서 디자인을 고정해버린다는 내용(①번 뒤)과 그로 인해 스케치의 불확실성에서 오는 유희를 '건너뛴다(bypasses)'는 설명이 이어지는 ②번 위치가 가장 적합합니다."
        },
        {
            box: "The designer at the computer also tends to emphasize formal experimentation at the expense of expressiveness.",
            parts: [
                "The transition from sketchpad to screen entails a loss of creativity and adventurousness.",
                "Due to CAD's nature, designers often lock in on a design too early, leading to what researchers call “premature fixation.”",
                "Once a large amount of detail is built into a model, there is a disincentive for further design changes.",
                "By weakening an architect’s “personal, emotional connection with the work,” CAD software produces designs that lack emotional content.",
                "These digital outputs, while complex and interesting, often feel detached from the human touch.",
                "Michael Graves argues that this detachment is a significant drawback of modern architectural practice."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "CAD 모델의 수정 불이익에 대한 기술적 설명(②번 앞)이 끝난 후, '또한(also)'이라며 컴퓨터 작업자가 표현력을 희생하면서 형식적 실험에만 치중한다는 추가적인 단점을 제시하는 ③번 위치가 정답입니다."
        },
        {
            box: "By weakening an architect’s “personal, emotional connection with the work,” Michael Graves argues, CAD software produces designs that lack the emotional content of a design derived from hand.",
            parts: [
                "Researchers term the computer-driven design habit “premature fixation,” where detail is built too quickly into a model.",
                "The designer at the computer tends to emphasize formal experimentation at the expense of expressiveness.",
                "This trend reflects a broader shift toward technological efficiency over artistic depth.",
                "While complex and interesting in their own way, these digital designs often feel hollow.",
                "Hand-drawn sketches, by contrast, maintain a vital link between the creator's mind and the physical manifestation of the idea.",
                "Graves suggests that the soul of architecture resides in this manual interaction."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "컴퓨터 작업의 특징(표현력 희생 등)에 대한 설명(②번 앞) 뒤에, 마이클 그레이브스의 견해를 빌려 CAD가 정서적 연결을 약화시킨다는 핵심 비판을 제시하는 ③번 위치가 정답입니다. 뒤의 'complex and interesting'이라는 구체적 묘사와 이어집니다."
        },
        {
            box: "The bold title reflects a growing sense that the architect’s freehand sketch is being displaced by the computer.",
            parts: [
                "In 2012, the Yale School of Architecture held a symposium called “Is Drawing Dead?”",
                "The transition from sketchpad to screen entails, many architects believe, a loss of creativity and adventurousness.",
                "A designer working at a computer has a tendency to lock in, visually and cognitively, on a design at an early stage.",
                "He bypasses much of the reflective and exploratory playfulness that springs from sketching.",
                "Researchers trace the cause of premature fixation to the disincentive for changes in a CAD model.",
                "Michael Graves argues that CAD software produces designs that lack the emotional content of those derived from hand."
            ],
            answer: 0, // 첫 번째 번호 (①번 위치)
            expl: "심포지엄의 제목인 '드로잉은 죽었는가?'를 언급한 직후(①번 앞), 그 대담한 제목이 '컴퓨터에 의해 스케치가 대체되고 있다'는 인식을 반영한다는 부연 설명을 하는 ①번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 설계의 본질을 꿰뚫어 보셨네요. ✍️";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택한 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
