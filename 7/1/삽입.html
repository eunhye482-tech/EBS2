<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (전문가와 1만 시간 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "However, recently, a cohort of researchers reexamined the studies and research behind the 10K figure and said, quite dramatically, that the ten-thousand-hour rule was utter nonsense.",
            parts: [
                "You’ve probably heard that it takes about ten thousand hours of practice to become an expert in anything—a musical instrument, a sport, chess, cooking, or a foreign language.",
                "The research by K. Anders Ericsson on this topic was made even more famous when Malcolm Gladwell described it in his bestselling book Outliers.",
                "Specifically, there is nothing particularly special about ten thousand hours.",
                "While practice is clearly important to boost performance, other factors may play an even more important role.",
                "What are those other factors that get us to expert levels of performance?",
                "Age, experience, and environment all play a role in predicting or ensuring mastery of anything."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "1만 시간의 법칙이 유명해졌다는 설명(②번 앞) 뒤에, 최근 연구자들이 이를 '완전한 터무니없는 소리(utter nonsense)'라며 반박하기 시작했다는 ③번 위치가 정답입니다. 뒤의 'Specifically'와 직접 연결됩니다."
        },
        {
            box: "Specifically, there is nothing particularly special about ten thousand hours, and while practice is clearly important to boost performance, other factors may play an even more important role.",
            parts: [
                "The research on ten thousand hours was made famous when Malcolm Gladwell described it in his book Outliers.",
                "However, recently, a cohort of researchers reexamined the research behind the 10K figure and called the rule utter nonsense.",
                "What are those other factors that get us to expert levels of performance?",
                "Pure innate talent? Intelligence? Luck of the draw? Perseverance? Hard work? Yes, it’s all of that... and more.",
                "Age, experience, and environment all play a role.",
                "In other words, there’s no one certain factor that can predict or ensure mastery of anything."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "1만 시간 법칙이 터무니없다는 주장(②번 앞)에 대해 '구체적으로(Specifically)' 무엇이 문제인지 부연 설명하며, 연습 외의 다른 요인들을 언급하기 시작하는 ③번 위치가 적합합니다."
        },
        {
            box: "What are those other factors that get us to expert levels of performance?",
            parts: [
                "However, researchers reexamined the studies and said that the ten-thousand-hour rule was utter nonsense.",
                "Specifically, there is nothing special about ten thousand hours, and other factors may play an even more important role.",
                "Pure innate talent? Intelligence? Luck of the draw? Perseverance? Hard work? Yes, it’s all of that... and more.",
                "Age, experience, and environment all play a role in this complex process.",
                "In other words, there’s no one certain factor that can predict or ensure mastery of anything.",
                " Mastery depends on a unique combination of various internal and external variables."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "연습 외의 다른 요인들이 중요하다는 언급(②번 앞) 뒤에, '그 다른 요인들이 무엇인가?'라고 질문을 던지고 자문자답(Innate talent, Intelligence 등)을 유도하는 ③번 위치가 정답입니다."
        },
        {
            box: "Pure innate talent? Intelligence? Luck of the draw? Perseverance? Hard work? Yes, it’s all of that... and more.",
            parts: [
                "Specifically, practice is important to boost performance, but other factors may play an even more important role.",
                "What are those other factors that get us to expert levels of performance?",
                "Age, experience, and environment all play a role.",
                "In other words, there’s no one certain factor that can predict or ensure mastery or optimal performance of anything.",
                "Performance is thus the result of a multifaceted interaction between the individual and their surroundings.",
                "The idea of a single secret ingredient for success is increasingly being dismissed by experts."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "다른 요인들에 대한 질문(②번 앞)에 대해 재능, 지능, 운 등 구체적인 요인들을 나열하며 답하는 ③번 위치가 가장 적절합니다."
        },
        {
            box: "In other words, there’s no one certain factor that can predict or ensure mastery or optimal performance of anything.",
            parts: [
                "Pure innate talent? Intelligence? Luck of the draw? Perseverance? Hard work? Yes, it’s all of that... and more.",
                "Age, experience, and environment all play a role.",
                "Mastery depends on a unique combination of various internal and external variables.",
                "Success is never guaranteed by a single attribute or a specific duration of time.",
                "The complexity of human achievement defies simple, one-size-fits-all explanations.",
                "Understanding this complexity is the first step toward achieving truly optimal performance."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "재능, 지능, 연령, 환경 등 다양한 요인이 복합적으로 작용한다는 앞선 문장들을 '다시 말해서(In other words)'라고 요약하며, 단 하나의 결정적 요인은 없음을 강조하며 글을 맺는 ③번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 당신은 이미 독해 전문가군요. 🏆";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
