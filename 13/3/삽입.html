<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (신체 내부 감각과 공감 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "The body acts as a critical conduit, supplying the brain with the visceral information it lacks.",
            parts: [
                "Becoming aware of our internal sensations can help us handle our own emotions.",
                "Perhaps more surprisingly, the body’s interoceptive faculty can also bring us into closer contact with other people’s emotions.",
                "That’s because the brain has no direct access to the contents of other people’s minds.",
                "Interpreting others’ spoken words and facial expressions may yield only a coolly abstract sense of emotions.",
                "It does so in this way: When interacting with other people, we subtly and unconsciously mimic their expressions.",
                "Then, via the interoception of our own bodies’ signals, we perceive what the other person is feeling."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "뇌가 타인의 마음을 직접 알 수 없고 말과 표정만으로는 추상적인 이해만 가능하다는 한계(③번 앞)를 지적한 뒤, 몸이 부족한 정보를 채워주는 '중요한 통로(critical conduit)' 역할을 한다는 ④번 위치가 정답입니다. 뒤의 'It does so'는 몸이 통로 역할을 하는 방식을 설명합니다."
        },
        {
            box: "It does so in this way: When interacting with other people, we subtly and unconsciously mimic their facial expressions, gestures, posture, and vocal pitch.",
            parts: [
                "The body’s interoceptive faculty can bring us into closer contact with other people’s emotions.",
                "The brain, on its own, has no direct access to the contents of other people’s minds.",
                "The body acts as a critical conduit, supplying the brain with the visceral information it lacks.",
                "Then, via the interoception of our own bodies’ signals, we perceive what the other person is feeling because we feel it in ourselves.",
                "We bring other people’s feelings onboard, and the body is the bridge.",
                "In an act similar to taking a bite off our partner’s plate, we are sampling their emotions."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "몸이 뇌에 정보를 제공한다는 일반적 원리(③번 앞) 뒤에, '이런 방식으로(in this way)'라며 구체적으로 타인을 모방한다는 메커니즘을 소개하는 ④번 위치가 적합합니다."
        },
        {
            box: "Then, via the interoception of our own bodies’ signals, we perceive what the other person is feeling because we feel it in ourselves.",
            parts: [
                "The body acts as a critical conduit, supplying the brain with the visceral information it lacks.",
                "When interacting with other people, we subtly and unconsciously mimic their facial expressions, gestures, and posture.",
                "We bring other people’s feelings onboard, and the body is the bridge.",
                "This emotional sampling allows us to connect with others on a deeper, more physiological level.",
                "By sharing their internal state, we bypass the limitations of purely intellectual observation.",
                "Our nervous systems essentially sync up, creating a shared experience of emotion."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "우리가 타인의 신체 언어를 모방한다는 행동적 설명(②번 앞) 뒤에, 그 모방으로 인해 발생한 우리 몸의 신호를 '내부 감각(interoception)'을 통해 감지하여 타인의 감정을 지각한다는 논리적 단계가 오는 ③번 위치가 정답입니다."
        },
        {
            box: "We bring other people’s feelings onboard, and the body is the bridge.",
            parts: [
                "When interacting, we mimic others' expressions and then perceive their feelings through our own body signals.",
                "In an act similar to taking a bite off our partner’s plate, we are sampling their emotions.",
                "This bridge is what turns a cold observation into a warm, shared feeling.",
                "Interoception thus becomes a tool for social cohesion and understanding.",
                "The physical self is not an island, but a dock for the emotions of those around us.",
                "This biological empathy is the foundation of human sociality."
            ],
            answer: 1, // ①번 뒤 (②번 위치)
            expl: "타인의 감정을 우리 몸으로 느낀다는 과정(①번 앞)을 '감정을 내 몸에 태운다(bring onboard)'와 '몸은 다리(bridge)다'라는 함축적인 표현으로 요약하며 마무리로 넘어가는 ②번 위치가 적절합니다."
        },
        {
            box: "In an act similar to taking a bite off our partner’s plate, or borrowing an earbud to hear the song our friend is listening to, we are sampling their emotions.",
            parts: [
                "The body acts as a critical conduit, supplying the brain with information through mimicry.",
                "Then, via the interoception of our own bodies’ signals, we perceive what the other person is feeling.",
                "We bring other people’s feelings onboard, and the body is the bridge.",
                "This process is as natural and immediate as sharing a physical object or sound.",
                "It requires no conscious effort, only a willingness to stay attuned to our own internal state.",
                "Through this visceral connection, we find common ground in the vast sea of human experience."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "몸이 감정 전달의 다리 역할을 한다는 핵심 설명(③번 앞)을 마친 후, '파트너의 음식을 한 입 먹는 것'과 같은 일상적인 비유를 들어 '감정 샘플링'이라는 개념으로 글을 마무리하는 ④번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 타인의 감정을 완벽히 샘플링하셨네요. ❤️";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택한 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 번호 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
