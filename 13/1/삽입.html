<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (아리스토텔레스 목적론 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "Rather, he addresses a more general question: how to account for natural objects, events, and processes that appear with regularity.",
            parts: [
                "In the Physics, Aristotle asks whether nature acts for the sake of something.",
                "He offers an account of rain as water that rises when heated by the Sun, then cools, condenses, and falls to Earth, but is not particularly concerned with explaining rain as such.",
                "He queries whether the sharpness of front teeth and the bluntness of molars is coincidental and rejects that possibility.",
                "This rejection is based on the idea that this arrangement occurs with regularity and that regularity is linked to purposefulness.",
                "The sharpness of front teeth allows them to tear while the bluntness of those in the back enables them to crush food.",
                "In Aristotle’s view, all natural things happen in a given way and occur for the sake of something; that is the final cause."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "비가 내리는 구체적 현상 자체에는 큰 관심이 없었다는 설명(②번 앞) 뒤에, '대신에(Rather)' 자연계에 규칙적으로 나타나는 현상들을 어떻게 설명할 것인가라는 더 일반적인 질문으로 넘어가는 ③번 위치가 정답입니다."
        },
        {
            box: "He queries whether the sharpness of front teeth and the bluntness of molars is coincidental and rejects that possibility, because this arrangement occurs with regularity.",
            parts: [
                "Aristotle asks whether nature acts for the sake of something in his work, Physics.",
                "He addresses the general question of how to account for natural objects that appear with regularity.",
                "That regularity is linked to purposefulness, which defines the functional structure of living beings.",
                "The sharpness of front teeth allows them to tear while the bluntness of those in the back enables them to crush food; both are useful for eating.",
                "In Aristotle’s view, all natural things happen in a given way and occur for the sake of something.",
                "This philosophical stance is known as teleology, or the study of ends and purposes."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "규칙적으로 나타나는 자연물에 대한 일반적 질문(②번 앞)을 던진 후, 구체적인 사례로 '치아의 날카로움과 뭉툭함'이 우연인지 묻고 이를 부정하는 ③번 위치가 정답입니다."
        },
        {
            box: "The sharpness of front teeth allows them to tear while the bluntness of those in the back enables them to crush food; both are useful for eating.",
            parts: [
                "Aristotle rejects the possibility that the arrangement of teeth is coincidental.",
                "He argues that this arrangement occurs with regularity and that regularity is linked to purposefulness.",
                "In Aristotle’s view, all natural things happen in a given way and occur for the sake of something.",
                "Everything in nature is directed toward a specific end that benefits the organism.",
                "This arrangement is not a product of chance but of a deeper, inherent logic.",
                "The final cause remains the most important factor in understanding any natural process."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "치아의 배치가 목적성과 연결되어 있다는 주장(②번 앞) 뒤에, 구체적으로 앞니와 어금니가 각각 어떤 '용도(useful for eating)'를 가지고 있는지 설명하는 ③번 위치가 적합합니다."
        },
        {
            box: "In Aristotle’s view, all natural things happen in a given way and occur for the sake of something; that is the final cause.",
            parts: [
                "Aristotle addresses how to account for natural objects that appear with regularity.",
                "He queries whether the structure of teeth is coincidental and links their regularity to purposefulness.",
                "The sharpness of front teeth allows them to tear while the bluntness of molars enables them to crush food.",
                "This observation leads to a broader conclusion about the fundamental nature of the physical world.",
                "Every natural phenomenon must be understood through the lens of its intended result.",
                "Ultimately, nature is a system where form is inextricably tied to function."
            ],
            answer: 3, // ④번 위치
            expl: "치아의 기능적 사례들(③번 앞)을 통해 도출된 결론이자, 모든 자연물이 목적을 위해 존재한다는 아리스토텔레스의 핵심 철학(목적인, final cause)을 정리하는 ④번 위치가 정답입니다."
        },
        {
            box: "He offers an account of rain as water that rises when heated by the Sun, then cools, condenses, and falls to Earth, but is not particularly concerned with explaining rain as such.",
            parts: [
                "In the Physics, Aristotle asks whether nature acts for the sake of something.",
                "Rather, he addresses a more general question: how to account for natural objects that appear with regularity.",
                "He queries whether the sharpness of front teeth and the bluntness of molars is coincidental.",
                "The regularity of these traits is linked to purposefulness, as they are useful for survival.",
                "Everything in the natural world occurs for the sake of something, a concept known as the final cause.",
                "This principle applies to both inanimate cycles and biological structures."
            ],
            answer: 1, // ①번 뒤 (②번 위치)
            expl: "자연이 무언가를 위해 작동하는지 묻는 도입부(①번 앞) 뒤에, 비가 내리는 물리적 과정을 설명하면서도 정작 그 개별 현상보다는 일반적 규칙성에 더 관심이 있었다는 전제를 까는 ②번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 아리스토텔레스의 목적인을 완벽히 이해하셨네요. 🦷";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 고른 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
