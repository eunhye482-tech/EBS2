<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (동기부여 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 20px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.5rem; margin-right: 10px; }
        .q-text { color: #ffeb3b; font-size: 1.1rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 18px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 25px;
            font-weight: 700;
            line-height: 1.6;
            font-size: 1.05rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.15rem;
            line-height: 2.3;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 32px;
            height: 32px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; transform: scale(1.1); }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
            animation: slideIn 0.4s ease;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 15px; width: 100%; padding: 15px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .blackboard::-webkit-scrollbar { width: 5px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 10px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.6; font-size: 1rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "Over time, such tactics cost more money and increase stress for employee and employer alike.",
            parts: [
                "Energy can always be injected into an organization to motivate people to do things.",
                "Bonuses, promotions, other carrots, and even a few sticks can get people to work harder, for sure.",
                "But the gains are, like all manipulations, short-term.",
                "Eventually, these methods will become the main reason people show up for work every day.",
                "That’s not loyalty; that’s the employee version of repeat business.",
                "Loyalty among employees is when they turn down more money to continue working at the same company."
            ],
            answer: 2, // ③번 위치
            expl: "주어진 문장의 'such tactics'는 앞 문장에 언급된 보너스, 승진 등 인위적인 보상책들을 가리킵니다. 단기적 성과 뒤에 따르는 장기적 비용과 스트레스를 설명하는 ③번 위치가 적합합니다."
        },
        {
            box: "That’s not loyalty. That’s the employee version of repeat business.",
            parts: [
                "Energy can be injected into an organization through bonuses and promotions.",
                "However, these manipulations only yield short-term gains.",
                "In the long run, they increase stress and become the primary reason for working.",
                "True loyalty is a different concept, where employees stay despite better offers elsewhere.",
                "Loyalty to a company trumps pay and benefits.",
                "It’s the cause that we come to work for, not just the specific tasks we perform."
            ],
            answer: 2, // ③번 위치
            expl: "단순히 보상 때문에 출근하는 상태를 ③번 앞에서 설명한 뒤, 그것은 충성심이 아니라 '반복 거래'의 직원 버전일 뿐이라고 정의하는 흐름이 자연스럽습니다."
        },
        {
            box: "But the gains are, like all manipulations, short-term.",
            parts: [
                "Energy can always be injected into an organization to motivate people to do things.",
                "Bonuses, promotions, other carrots, and even a few sticks can get people to work harder, for sure.",
                "Such tactics eventually cost more money and increase stress for everyone involved.",
                "Over time, these incentives become the main reason people show up for work every day.",
                "Loyalty, on the other hand, occurs when employees turn down more money to stay with the company.",
                "It is the cause, rather than the work itself, that inspires true commitment."
            ],
            answer: 2, // ③번 위치
            expl: "보상책이 사람들을 더 열심히 일하게 만든다는 긍정적 효과(②번 앞) 뒤에, '하지만(But)' 그것은 조작이며 단기적일 뿐이라는 비판이 이어져야 합니다."
        },
        {
            box: "And unless you’re an astronaut, it’s not the work we do that inspires us either.",
            parts: [
                "Loyalty among employees is when they turn down more money to continue working at the same company.",
                "Loyalty to a company trumps pay and benefits.",
                "It’s the cause that we come to work for.",
                "We don’t want to come to work to build a wall.",
                "We want to come to work to build a cathedral.",
                "This sense of purpose is what creates a lasting bond between employer and employee."
            ],
            answer: 1, // ②번 위치
            expl: "금전적 보상보다 충성심이 중요하다는 이야기 뒤에, '업무 그 자체' 또한 영감의 원천이 아님을 덧붙이는 ②번이 적합합니다. 이후 '신념(Cause)'에 대한 이야기가 나옵니다."
        },
        {
            box: "We don’t want to come to work to build a wall; we want to come to work to build a cathedral.",
            parts: [
                "Loyalty to a company trumps pay and benefits.",
                "It’s not the work we do that inspires us; it’s the cause that we come to work for.",
                "This distinction explains why people choose to stay in an organization for years.",
                "They are looking for a meaning that goes beyond the daily routine.",
                "When we feel part of something bigger, we become truly loyal.",
                "Therefore, leaders must communicate a clear sense of purpose to their teams."
            ],
            answer: 1, // ②번 위치
            expl: "단순한 업무가 아닌 '대의(Cause)'를 위해 일한다는 앞 문장의 추상적인 개념을 '담벼락'과 '성당'이라는 비유를 통해 구체적으로 설명하는 ②번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 완벽한 논리력입니다. 💡";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong');
            all[q.answer].classList.add('correct');
            res.innerText = "아쉽네요, 틀렸습니다.";
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
