<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (비판적 사고 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 20px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.5rem; margin-right: 10px; }
        .q-text { color: #ffeb3b; font-size: 1.1rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 18px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 25px;
            font-weight: 700;
            line-height: 1.6;
            font-size: 1.05rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.15rem;
            line-height: 2.3;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 32px;
            height: 32px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 15px; width: 100%; padding: 15px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 5px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">주어진 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 10px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.6; font-size: 1rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "But probe even deeper. Once we start thinking deeply, long-held assumptions are challenged.",
            parts: [
                "People may not think critically for a variety of reasons, such as laziness and inability, but fear is a big one.",
                "People don’t want to think not just because it’s hard, but also because they’re afraid it will make them question their long-held beliefs.",
                "Your students most likely do want to think about things that can be very controversial, like politics, ethics, and philosophy.",
                "Thought makes us worry that we’ll lose our balance and have to look at the world in a different way.",
                "We worry about thinking because we care about what we and other people think.",
                "Thinking is important to us, to others, and to the world we live in."
            ],
            answer: 2, // ③번 위치
            expl: "학생들이 논쟁적인 주제에 대해 생각하고 싶어 한다는 내용 뒤에, '하지만 더 깊이 파고들어 보라'며 사고가 가져오는 근원적인 두려움(기존 가정에 대한 도전)을 설명하는 ③번 위치가 정답입니다."
        },
        {
            box: "Non-Euclidean geometry and symbolic logic are about as abstract as thinking can get, but you can’t understand Einsteinian gravity without the first and run computers without the second.",
            parts: [
                "Even the most far-fetched ideas have an effect on the world.",
                "Thought makes us worry that we’ll lose our balance and have to look at the world in a different way.",
                "Thinking is important to us, to others, and to the world we live in.",
                "This is one reason why we are so afraid of it: It shakes us to the core.",
                "We worry about thinking because we care about what we and other people think.",
                "Deep thinking can lead to fundamental shifts in how we perceive reality."
            ],
            answer: 1, // ②번 위치 (변형 문맥 반영)
            expl: "아무리 동떨어진 아이디어라도 세상에 영향을 미친다는 ①번 뒤에, 비유클리드 기하학과 기호 논리학이라는 구체적인 추상적 예시를 들어 그 영향력을 증명하는 ②번 위치가 적합합니다."
        },
        {
            box: "People don’t want to think not just because it’s hard, but also because they’re afraid it will make them question their long-held beliefs.",
            parts: [
                "People may not think critically for a variety of reasons, such as laziness and inability, but fear is a big one.",
                "Why is that?",
                "Your students most likely do want to think about things that can be very controversial, like politics, ethics, and philosophy.",
                "But probe even deeper; once we start thinking deeply, long-held assumptions are challenged.",
                "Thought makes us worry that we’ll lose our balance and have to look at the world in a different way.",
                "Thinking is important to us, to others, and to the world we live in."
            ],
            answer: 1, // ②번 위치
            expl: "사고를 방해하는 큰 원인으로 '두려움'을 꼽은 뒤, '왜 그런가?(Why is that?)'라는 질문에 대한 직접적인 대답으로 '신념을 의심하게 될까 봐 두렵기 때문'이라는 내용이 오는 ②번이 정답입니다."
        },
        {
            box: "Thinking is important to us, to others, and to the world we live in.",
            parts: [
                "Even the most far-fetched ideas have an effect on the world.",
                "Non-Euclidean geometry and symbolic logic are abstract, yet they are essential for understanding gravity and running computers.",
                "We worry about thinking because we care about what we and other people think.",
                "This is one reason why we are so afraid of it: It shakes us to the core.",
                "Thinking profoundly changes our internal and external landscapes.",
                "The power of thought is both our greatest tool and our deepest fear."
            ],
            answer: 2, // ③번 위치
            expl: "추상적인 생각이 현실 세계에 미치는 구체적인 영향력을 설명한 뒤, 사고가 우리와 타인, 세계 모두에게 중요하다는 결론적 진술을 하는 ③번 위치가 자연스럽습니다."
        },
        {
            box: "This is one reason why we are so afraid of it: It shakes us to the core.",
            parts: [
                "Thinking is important to us, to others, and to the world we live in.",
                "Even the most far-fetched ideas have an effect on the world, from science to daily technology.",
                "We worry about thinking because we care about what we and other people think.",
                "Thought makes us worry that we’ll lose our balance and have to look at the world in a different way.",
                "It’s the cause of both our progress and our existential anxiety.",
                "Thus, the act of thinking remains a challenging endeavor for many."
            ],
            answer: 4, // ⑤번 위치
            expl: "사고가 미치는 막강한 영향력과 중요성을 모두 언급한 후, 바로 그 '중요성' 때문에 우리가 사고를 두려워하며 그것이 우리를 근간부터 흔든다는 최종 결론을 내리는 ⑤번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 비판적 사고의 달인이시군요. 🧠";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong');
            all[q.answer].classList.add('correct');
            res.innerText = "틀렸습니다. 문장 간의 연결 고리를 다시 읽어보세요.";
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
