<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (DNA 역사 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 20px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.5rem; margin-right: 10px; }
        .q-text { color: #ffeb3b; font-size: 1.1rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 18px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 25px;
            font-weight: 700;
            line-height: 1.6;
            font-size: 1.05rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.15rem;
            line-height: 2.3;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 32px;
            height: 32px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
            animation: slideUp 0.4s ease;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 15px; width: 100%; padding: 15px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .blackboard::-webkit-scrollbar { width: 5px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">주어진 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 10px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.6; font-size: 1rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "But the statement is equally true if the word “people” is replaced with “all of life on Earth, present and past.”",
            parts: [
                "In the early 1960s the great American writer James Baldwin wrote: “People are trapped in history, and history is trapped in them.”",
                "He was speaking to race when he penned those words.",
                "For each strand of DNA, in each of our cells, is an ancient record of biological history, written in simple code and passed down from generation to generation.",
                "One could say that DNA is nothing but history, one with a physical manifestation that was slowly blended and accumulated over countless eons by the most pitiless of all phenomena—natural selection.",
                "DNA is a history that is inside us—and yet one that is our master as well, the blueprint for our bodies.",
                "We are indeed trapped in this particular vehicle of history as much as it is trapped in us."
            ],
            answer: 2, // ③번 위치
            expl: "제임스 볼드윈의 특정 발언(인종 문제) 뒤에, 그 진술(`the statement`)이 생명체 전체로 확장될 수 있다는 반전의 연결어 'But'과 함께 제시되는 ②번 뒤(③번 위치)가 정답입니다."
        },
        {
            box: "One could say that DNA is nothing but history, one with a physical manifestation that was slowly blended and accumulated over countless eons.",
            parts: [
                "James Baldwin once wrote that people are trapped in history, and history is trapped in them.",
                "This idea applies perfectly to the biological world, where each cell contains an ancient record passed down through generations.",
                "This record was shaped by the most pitiless of all phenomena—natural selection.",
                "DNA is a history that is inside us—and yet one that is our master as well, the blueprint for our bodies.",
                "It is the dictator of what we will pass on to our children, gifts that can be blessings or deadly time bombs.",
                "We are indeed trapped in this particular vehicle of history as much as it is trapped in us."
            ],
            answer: 2, // ③번 위치
            expl: "주어진 문장의 'a physical manifestation(물리적 발현)'이 ③번 뒤의 'This record(이 기록)'와 자연스럽게 연결되며, 자연선택에 의해 형성되었다는 설명으로 이어집니다."
        },
        {
            box: "DNA is a history that is inside us—and yet one that is our master as well, the blueprint for our bodies.",
            parts: [
                "In the early 1960s James Baldwin wrote that people are trapped in history.",
                "This concept holds true for DNA, which acts as an ancient record of biological history written in simple code.",
                "One could say that DNA is nothing but history, slowly blended and accumulated over countless eons by natural selection.",
                "It acts as the dictator of what we will pass on to our children, gifts that can be blessings or deadly time bombs.",
                "These genetic gifts determine our health and our future characteristics.",
                "We are indeed trapped in this particular vehicle of history as much as it is trapped in us."
            ],
            answer: 3, // ④번 위치
            expl: "DNA가 우리를 지배하는 '주인(master)'이자 '청사진(blueprint)'이라는 내용이 제시된 후, 자녀에게 전달되는 형질을 결정하는 '독재자(dictator)'라는 비유로 심화되는 흐름입니다."
        },
        {
            box: "He was speaking to race when he penned those words.",
            parts: [
                "In the early 1960s the great American writer James Baldwin wrote: “People are trapped in history, and history is trapped in them.”",
                "But the statement is equally true if we apply it to the biological history of all life on Earth.",
                "Each strand of DNA in our cells is an ancient record passed down from generation to generation.",
                "DNA is history with a physical manifestation, accumulated over eons by natural selection.",
                "It is both inside us and our master, dictating what we pass on to our children.",
                "We are indeed trapped in this particular vehicle of history as much as it is trapped in us."
            ],
            answer: 1, // ②번 위치
            expl: "제임스 볼드윈의 인용구가 처음 제시된 직후, 그가 원래 어떤 맥락(race)에서 그 말을 했는지 설명하는 ①번 뒤(②번 위치)가 적절합니다."
        },
        {
            box: "We are indeed trapped in this particular vehicle of history as much as it is trapped in us.",
            parts: [
                "DNA is an ancient record of biological history, written in simple code and passed down through generations.",
                "This history was slowly blended and accumulated over countless eons by natural selection.",
                "DNA is the blueprint for our bodies and the dictator of what we pass on to our children.",
                "These genetic gifts can be seen as blessings or deadly time bombs waiting to go off.",
                "This relationship between our biology and our past creates a cycle of mutual entrapment.",
                "Ultimately, we cannot escape the biological legacy that defines our existence."
            ],
            answer: 4, // ⑤번 위치
            expl: "지문의 핵심 결론인 '우리가 역사의 수단(DNA)에 갇혀 있고, 역사 또한 우리 안에 갇혀 있다'는 제임스 볼드윈의 말을 다시 변주하며 마무리하는 문장으로, ⑤번 위치가 가장 강력합니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! DNA만큼이나 정확하시네요. 🧬";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong');
            all[q.answer].classList.add('correct');
            res.innerText = "틀렸습니다. 논리의 연결 고리를 다시 확인하세요.";
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
