<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (딥 워크 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "For many people though, we spend far too much time on the other end of the scale, doing what is referred to as shallow work.",
            parts: [
                "Deep work is when you perform an activity with deep concentration that pushes your cognitive capabilities, creating new value.",
                "These efforts are hard to replicate; and to be able to do deep work, we need a distraction-free environment.",
                "This style of working is not cognitively demanding but is rather an execution of logical-type tasks that rarely create new value.",
                "We often perform these tasks while we are distracted, failing to engage our higher mental faculties.",
                "Shallow work has its place, both because routine-type tasks need to be done and because we cannot spend our entire time doing deep work.",
                "The problem with too much shallow work is that we feel busy but rarely see any output reflecting our effort."
            ],
            answer: 2, // ③번 위치
            expl: "딥 워크의 정의와 환경(②번 앞)을 설명한 뒤, '하지만(though)'이라며 반대 개념인 '얕은 업무(shallow work)'를 소개하는 ③번 위치가 정답입니다. 뒤의 'This style'이 바로 얕은 업무를 지칭합니다."
        },
        {
            box: "This style of working is not cognitively demanding but is rather an execution of logical-type tasks that rarely create new value (although they may still be important).",
            parts: [
                "Deep work pushes your cognitive capabilities and improves your skills through deep concentration.",
                "For many people, we spend far too much time on the other end of the scale, doing shallow work.",
                "We often perform these tasks while we are distracted, such as checking emails or simple data entry.",
                "Shallow work has its place, both because routine-type tasks need to be done and because we cannot spend our entire time doing deep work.",
                "The problem with too much shallow work is that we feel busy, maybe even stressed.",
                "But we rarely see any output reflecting our experienced effort at the end of the day."
            ],
            answer: 2, // ③번 위치
            expl: "얕은 업무를 소개한 직후(②번 앞), 그 업무 스타일의 구체적인 특징(인지적 요구가 낮음, 새로운 가치 창출 거의 없음)을 설명하는 ③번 위치가 정답입니다."
        },
        {
            box: "Shallow work has its place, both because routine-type tasks need to be done and because we cannot spend our entire time doing deep work.",
            parts: [
                "Deep work is hard to replicate and requires a distraction-free environment.",
                "Shallow work involves logical-type tasks that we often perform while we are distracted.",
                "The problem with too much shallow work is that we feel busy, maybe even stressed.",
                "We rarely see any output reflecting our experienced effort when shallow work dominates our schedule.",
                "True productivity requires a strategic balance between these two different modes of effort.",
                "Understanding the nature of each task allows us to allocate our cognitive energy more effectively."
            ],
            answer: 2, // ③번 위치
            expl: "얕은 업무의 단점과 특징을 나열한 뒤(②번 앞), 그럼에도 불구하고 얕은 업무가 필요한 이유(일상 업무 처리, 휴식 필요성)를 인정하며 논점을 전환하는 ③번 위치가 정답입니다."
        },
        {
            box: "The problem with too much shallow work is that we feel busy, maybe even stressed, but we rarely see any output reflecting our experienced effort.",
            parts: [
                "Deep work creates new value and improves skills through intense concentration.",
                "Shallow work is not cognitively demanding and includes tasks that need to be done routinely.",
                "It has its place because we cannot spend our entire time doing cognitively demanding deep work.",
                "Without tangible results, our motivation begins to fade, leading to a cycle of unproductive busyness.",
                "This paradox of the modern workplace leaves many professionals feeling unfulfilled.",
                "Breaking this cycle requires a deliberate commitment to scheduling blocks of uninterrupted time."
            ],
            answer: 3, // ④번 위치
            expl: "얕은 업무의 필요성을 언급한 문장(③번 앞) 뒤에, 그럼에도 불구하고 그것이 '너무 많을 때' 발생하는 문제점(바쁘지만 성과가 없음)을 지적하며 글을 마무리하는 ④번 위치가 정답입니다."
        },
        {
            box: "These efforts are hard to replicate; and to be able to do deep work, we need a distraction-free environment.",
            parts: [
                "Deep work is when you perform an activity with deep concentration that pushes your cognitive capabilities.",
                "For many people though, we spend far too much time on the other end of the scale, doing shallow work.",
                "This style of working is rather an execution of logical-type tasks that rarely create new value.",
                "Shallow work has its place because routine-type tasks need to be done.",
                "The problem is that we feel busy but rarely see any output reflecting our effort.",
                "Therefore, protecting our time for high-value tasks is essential for career growth."
            ],
            answer: 1, // ②번 위치
            expl: "딥 워크의 정의(①번 앞) 바로 뒤에, 그 업무의 희소성(복제하기 어려움)과 필수적인 수행 조건(방해 없는 환경)을 덧붙이는 ②번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 딥 워크의 가치를 완벽히 이해하셨네요. ✍️";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
