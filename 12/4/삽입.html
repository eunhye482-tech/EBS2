<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (문학의 역동성 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "We have all had the experience of taking up a classic work of literature after several years and finding in it details and significance we missed the first (or fifth) time through.",
            parts: [
                "Literature is not a disposable carrier of nuggets of information. It invites us back again and again to re-experience what it offers.",
                "Literature continues to communicate meaning and significance over time, and, most remarkably, to shift its meaning based on our perspective.",
                "What has changed is not the work of literature exactly but our experiences that are now reflected in the text.",
                "One’s perception of Shakespeare’s King Lear is a different experience read in one’s twenties than it is in one’s seventies.",
                "This is true because reading literature requires full reader participation, activating analysis, imagination, and emotions.",
                "Those changes explain how works of literature are more dynamic than everyday reading."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "문학의 의미가 독자의 관점에 따라 변한다는 일반적 진술(②번 앞) 뒤에, 우리가 고전을 다시 읽으며 새로운 의미를 발견하는 구체적인 경험을 제시하는 ③번 위치가 정답입니다. 뒤의 'What has changed'가 이 경험에 대한 분석으로 이어집니다."
        },
        {
            box: "What has changed is not the work of literature exactly but our experiences that are now reflected in the text.",
            parts: [
                "Literature invites us back again and again to re-experience what it offers and to reassess its meanings.",
                "Literature continues to shift its meaning based on our perspective over time.",
                "We have all had the experience of finding new details in a classic work after several years.",
                "One’s perception of Shakespeare’s King Lear is a different experience read in one’s twenties than it is in one’s seventies.",
                "Reading literature requires full reader participation, activating analysis, imagination, and emotions.",
                "These elements change over time, making literature more dynamic than everyday reading."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "오랜만에 책을 다시 읽으며 새로운 것을 발견했다는 경험적 사실(③번 앞) 뒤에, 그 변화의 실체가 작품이 아닌 '우리 자신의 경험'임을 명시하는 ④번 위치가 정답입니다."
        },
        {
            box: "One’s perception of Shakespeare’s grand drama on aging under existential threat, King Lear, is a different experience read in one’s twenties than it is in one’s seventies.",
            parts: [
                "Literature continues to shift its meaning based on our perspective.",
                "What has changed is not the work but our experiences reflected in the text.",
                "This is true because reading literature, as opposed to everyday reading, requires full reader participation.",
                "It activates not just our informational processing skills but our analysis, imagination, and emotions.",
                "These change over time in every person, making literature uniquely dynamic.",
                "Ultimately, literature functions as a mirror to our own growth and development."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "작품의 의미 변화가 독자의 경험 때문이라는 설명(②번 앞) 뒤에, '리어 왕'이라는 구체적인 작품과 연령대(20대 vs 70대)를 예로 들어 증명하는 ③번 위치가 적합합니다."
        },
        {
            box: "This is true because reading literature, as opposed to everyday reading, requires full reader participation, activating not just our informational processing skills but our analysis, imagination, and emotions.",
            parts: [
                "Literature shifts its meaning based on our perspective and experiences.",
                "Reading King Lear in one's seventies is a vastly different experience than reading it in one's twenties.",
                "These change over time in every person, and those changes explain how works of literature are more dynamic than everyday reading.",
                "Every person's unique background adds a layer of depth to the literary encounter.",
                "The text remains static, but the interaction with it is constantly evolving.",
                "This profound engagement is what distinguishes high art from mere entertainment."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "연령대에 따라 독서 경험이 다르다는 예시(②번 앞)에 대해, 왜 그것이 사실인지(This is true) 근거(독자의 전면적 참여)를 밝히는 ③번 위치가 정답입니다."
        },
        {
            box: "Those changes explain how works of literature are more dynamic than everyday reading.",
            parts: [
                "Reading literature requires full reader participation, activating analysis, imagination, and emotions.",
                "These elements—analysis, imagination, and emotions—change over time in every person.",
                "A child might focus on the plot, while an adult sees the underlying moral complexities.",
                "Perspective is the lens through which the story is interpreted and felt.",
                "As we grow, the story grows with us, revealing new facets of human truth.",
                "Literature thus provides a lifelong journey of rediscovery and self-reflection."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "독자의 분석력, 상상력, 감정이 시간에 따라 변한다는 내용(②번 앞)을 결론지으며, 이러한 변화가 문학을 '역동적(dynamic)'으로 만드는 이유임을 설명하는 ③번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 문학의 깊이를 완벽히 이해하셨네요. 🎭";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
