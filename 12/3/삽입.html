<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (의약품 vs 보조식품 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "None of this is true for dietary supplements.",
            parts: [
                "A drug is intended to diagnose, cure, mitigate, treat, or prevent disease. Before marketing, drugs must undergo extensive studies of effectiveness and safety.",
                "The FDA gives formal premarket approval to a drug and monitors its safety after the drug is on the market.",
                "If a drug is subsequently shown to be dangerous, the FDA can act quickly to have it removed from the market.",
                "The current law gives the FDA only limited authority over supplements, making it difficult to remove unsafe products.",
                "The FDA does not evaluate the safety and effectiveness of supplements before they hit the marketplace.",
                "There are some legislators in Congress who want to improve the law by requiring supplement makers to put safer products on the shelves."
            ],
            answer: 2, // ③번 위치
            expl: "의약품에 적용되는 엄격한 승인 및 모니터링 절차(②번 앞)에 대한 설명이 끝난 후, 보조식품에게는 '이 중 어느 것도 해당하지 않는다(None of this is true)'며 대조를 시작하는 ③번 위치가 정답입니다."
        },
        {
            box: "The current law gives the FDA only limited authority over supplements.",
            parts: [
                "A drug must undergo extensive studies and receive formal FDA approval before hitting the market.",
                "None of this is true for dietary supplements, as they are regulated differently.",
                "This makes it difficult for the government to remove unsafe supplements from the marketplace.",
                "The FDA does not evaluate the safety and effectiveness of supplements before they hit the marketplace.",
                "There are some legislators who want to requiring supplement makers to put safer products on the shelves.",
                "The objective is to ensure that consumers can tell the difference between dietary supplements that are safe and those that are not."
            ],
            answer: 2, // ③번 위치
            expl: "보조식품은 의약품과 규제가 다르다는 언급(②번 앞) 뒤에, 구체적으로 현행법이 FDA에 '제한된 권한'만을 준다는 사실을 명시하는 ③번 위치가 적합합니다. 뒤의 'This(제한된 권한)'와 연결됩니다."
        },
        {
            box: "This makes it difficult for the government to remove unsafe supplements from the marketplace.",
            parts: [
                "The current law gives the FDA only limited authority over supplements.",
                "The FDA does not evaluate the safety and effectiveness of supplements before they hit the marketplace.",
                "There are some legislators in Congress who want to improve the law by requiring supplement makers to label products more clearly.",
                "The objective is to ensure that consumers can tell the difference between dietary supplements that are safe and those that have serious side effects.",
                "Better labeling would empower users to make informed choices about their health and nutrition.",
                "Such reforms aim to bridge the safety gap between pharmaceuticals and supplements."
            ],
            answer: 1, // ②번 위치
            expl: "FDA가 제한된 권한만을 가지고 있다는 앞 문장(①번 뒤)의 결과(This)로서, 정부가 안전하지 않은 보조식품을 시장에서 제거하기 어렵다는 결론이 도달하는 ②번 위치가 정답입니다."
        },
        {
            box: "The FDA does not evaluate the safety and effectiveness of supplements before they hit the marketplace.",
            parts: [
                "A drug is intended to treat disease and must undergo extensive studies before marketing.",
                "None of this is true for supplements, and the government has difficulty removing unsafe ones.",
                "The current legal framework leaves the premarket phase largely unmonitored for these products.",
                "There are some legislators in Congress who want to improve the law by requiring supplement makers to put safer products on the shelves.",
                "The objective is to ensure consumers can distinguish safe supplements from those with potentially serious side effects.",
                "This change would bring supplement regulation closer to the standards applied to prescription drugs."
            ],
            answer: 2, // ③번 위치
            expl: "보조식품에 대한 정부의 통제가 어렵다는 일반적 사실(②번 앞) 뒤에, 구체적으로 '시판 전(before they hit the marketplace)' 평가가 이루어지지 않는다는 절차적 허점을 지적하는 ③번 위치가 정답입니다."
        },
        {
            box: "The objective is to ensure that consumers can tell the difference between dietary supplements that are safe and those that have potentially serious side effects or drug interactions.",
            parts: [
                "The FDA does not evaluate the safety and effectiveness of supplements before they hit the marketplace.",
                "There are some legislators in Congress who want to improve the law by requiring supplement makers to put safer products on the shelves.",
                "They also want to require makers to label products more clearly.",
                "This legislative effort reflects a growing concern for public health in a rapidly expanding industry.",
                "Clearer guidelines would provide a safety net for millions of people who take supplements daily.",
                "In the long run, transparency will benefit both the consumers and the reputable manufacturers."
            ],
            answer: 3, // ④번 위치
            expl: "입법자들이 제품 안전 강화와 명확한 라벨링을 요구한다는 내용(③번 앞) 뒤에, 그러한 법 개정의 '목표(The objective)'가 소비자의 변별력을 높이는 것임을 설명하는 ④번 위치가 적합합니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 안전한 독해 능력을 입증하셨네요. 💊";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
