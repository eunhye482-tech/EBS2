<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (자연주의 본능 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "The answer likely lies in our genes.",
            parts: [
                "Why do humans have the counterproductive instinct to favor natural products in the absence of knowledge of their benefits or their potential for harm?",
                "Our species, through most of its evolutionary history, relied heavily upon experience to judge whether ingestion of something was beneficial versus whether it was dangerous.",
                "We evolved the instinct to avoid plants that made us sick and favored those that made us well.",
                "Today, we trust that products of nature are safe to consume.",
                "But those pills coming off a pharmaceutical production line look nothing like what our instincts tell us is safe to eat.",
                "When in need of a remedy, we are drawn to plant products which we perceive to be safe, and not artificial products of science."
            ],
            answer: 1, // ①번 뒤 (②번 위치)
            expl: "자연물을 선호하는 본능에 대한 질문(①번 앞)에 대해, 그 답이 '유전자'에 있을 것이라고 대답하며 진화론적 근거를 제시하기 시작하는 ②번 위치가 정답입니다."
        },
        {
            box: "Today, we trust that products of nature are safe to consume.",
            parts: [
                "Our species relied heavily upon experience to judge whether something was nutritional versus whether it was poisonous.",
                "We evolved the instinct to avoid plants that made us sick and favored those that made us well.",
                "But those pills coming off a pharmaceutical production line look nothing like what our instincts tell us is safe to eat.",
                "The ingredients remind us of a high school chemistry lab, yet we are expected to consume them.",
                "Thus, we treat them with caution just as our distant ancestors regarded a new plant.",
                "When in need of a remedy, we are drawn to derivatives of our food, plant products, which we perceive to be safe."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "과거 조상들의 본능적 학습(②번 앞)에 대한 설명이 끝나고, 그 본능이 오늘날(Today)에도 이어져 자연물을 신뢰한다는 내용으로 넘어가는 ③번 위치가 정답입니다. 뒤의 'But(제약 회사 알약)'과 대조를 이룹니다."
        },
        {
            box: "But those pills coming off a pharmaceutical production line look nothing like what our instincts tell us is safe to eat.",
            parts: [
                "We evolved the instinct to avoid plants that made us sick and favored those that made us well.",
                "Today, we trust that products of nature are safe to consume.",
                "The ingredients remind us of a high school chemistry lab.",
                "Yet we are expected to consume them.",
                "Thus, we treat them with caution just as our distant ancestors regarded a new plant.",
                "When in need of a remedy, we are drawn to plant products, which we perceive to be safe, and not artificial products of science."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "자연물이 안전하다고 믿는 경향(②번 앞)과 대조적으로('But'), 제약 공정에서 나온 알약은 우리 본능이 안전하다고 느끼는 모습과 거리가 멀다는 ③번 위치가 정답입니다."
        },
        {
            box: "Thus, we treat them with caution just as our distant ancestors regarded a new plant.",
            parts: [
                "Those pills coming off a pharmaceutical production line look nothing like what our instincts tell us is safe to eat.",
                "The ingredients remind us of a high school chemistry lab, yet we are expected to consume them.",
                "When in need of a remedy, we are drawn to derivatives of our food, plant products, which we perceive to be safe.",
                "This preference for the familiar often leads us away from potentially more effective modern treatments.",
                "Our evolutionary baggage continues to influence our choices in a world driven by synthetic chemistry.",
                "Understanding this bias is the first step toward making more evidence-based health decisions."
            ],
            answer: 2, // ③번 위치
            expl: "화학실험실 같은 성분의 약을 먹어야 하는 상황(②번 뒤)에 대해, 결과적으로('Thus') 우리가 조상들이 낯선 식물을 보듯 약을 경계하게 된다는 인과 관계를 완성하는 ③번 위치가 정답입니다."
        },
        {
            box: "When in need of a remedy, we are drawn to derivatives of our food, plant products, which we perceive to be safe, and not artificial products of science.",
            parts: [
                "The ingredients of pharmaceutical pills remind us of a chemistry lab, yet we are expected to consume them.",
                "Thus, we treat them with caution just as our distant ancestors regarded a new plant.",
                "This ancient wariness persists despite the rigorous testing these modern products undergo.",
                "Our intuition remains anchored in a past where nature was the only provider of medicine.",
                "By acknowledging this instinct, we can begin to appreciate why scientific communication often struggles against naturalistic fallacies.",
                "Ultimately, the goal is to bridge the gap between our primal fears and our modern knowledge."
            ],
            answer: 2, // ③번 위치
            expl: "약에 대한 경계심(②번 앞)에 대한 결론으로서, 우리가 과학의 인공적 산물보다는 안전하다고 느끼는 '식물 산물'에 끌리게 된다는 지문의 최종 요약이 들어가는 ③번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 진화적 본능을 완벽히 이해하셨네요. 🌿";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택한 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 번호 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
