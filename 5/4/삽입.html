<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (호흡과 수행 능력 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "However, it is equally important for an athlete to learn how to mentally and physically downshift from the acute sympathetic activity experienced in sport.",
            parts: [
                "Training and competition naturally speed the breath, which activates the sympathetic nervous system.",
                "In performance, this is acceptable because an athlete wants to produce adrenaline and compete and train in an aroused state.",
                "Outside of performance they should focus their attention on slow breathing to reduce the sympathetic activity and resolve the fight-or-flight state.",
                "In the Feinstein Institutes study, participants were able to use the pace of their breathing to activate specific regions of the brain.",
                "In a performance realm, this means athletes can use breathing pace to manage their state of arousal.",
                "During training and competition, the breathing rate increases with the introduction of adrenaline."
            ],
            answer: 2, // ③번 위치
            expl: "운동 수행 중의 각성 상태(심박수 증가)가 허용된다는 내용(②번 앞) 뒤에, '하지만(However)' 다시 진정시키는 과정(downshift)도 똑같이 중요하다는 반전의 내용이 오는 ③번 위치가 가장 적합합니다."
        },
        {
            box: "In the Feinstein Institutes study, participants were able to use the pace of their breathing to activate specific regions of the brain.",
            parts: [
                "Training and competition naturally speed the breath, which activates the sympathetic nervous system.",
                "However, it is equally important for an athlete to learn how to mentally and physically downshift and resolve the fight-or-flight state.",
                "Outside of performance, focusing on slow breathing can effectively reduce the sympathetic activity.",
                "In a performance realm, this means athletes can use breathing pace to manage their state of arousal.",
                "During training and competition, the breathing rate increases with the introduction of adrenaline.",
                "Athletes must be able to control this to be able to adapt and recover properly."
            ],
            answer: 3, // ④번 위치
            expl: "호흡 속도를 통해 뇌의 특정 영역을 활성화할 수 있다는 연구 결과(③번 뒤)가 먼저 제시되어야, ④번 뒤에서 '수행 영역에서 이것(this)이 의미하는 바'를 설명할 수 있습니다."
        },
        {
            box: "In a performance realm, this means athletes can use breathing pace to manage their state of arousal.",
            parts: [
                "Training and competition naturally speed the breath, which activates the sympathetic nervous system.",
                "However, athletes must learn how to downshift from the acute sympathetic activity experienced in sport.",
                "In the Feinstein Institutes study, participants were able to use the pace of their breathing to activate specific regions of the brain.",
                "During training and competition, the breathing rate increases with the introduction of adrenaline.",
                "Athletes must be able to control this increase to be able to adapt and recover effectively.",
                "One way is to practice slower breathing protocols outside of training and competition."
            ],
            answer: 3, // ④번 위치
            expl: "뇌 활성화에 대한 연구 결과(③번 앞)를 바탕으로, 실제 수행 현장에서 선수들이 호흡을 통해 각성 상태를 '관리할 수 있다'는 구체적 적용점을 설명하는 ④번 위치가 적절합니다."
        },
        {
            box: "During training and competition, the breathing rate increases with the introduction of adrenaline, and athletes must be able to control this to be able to adapt and recover.",
            parts: [
                "In performance, a sped-up breath is acceptable because an athlete wants to compete in an aroused state.",
                "However, learning to downshift from acute sympathetic activity is equally important outside of sport.",
                "Athletes can use breathing pace to manage their state of arousal, as suggested by brain studies.",
                "One way to achieve this control is to practice slower breathing protocols outside of training.",
                "This regular practice helps reset the nervous system more efficiently.",
                "Consistent training in breathing leads to better overall physiological resilience."
            ],
            answer: 3, // ④번 위치
            expl: "수행 중 아드레날린 분비로 인한 호흡률 증가를 조절해야 한다는 내용(③번 뒤)이 와야, 뒤이어 그 방법(One way)으로 '훈련 외 시간의 느린 호흡 연습'이 자연스럽게 연결됩니다."
        },
        {
            box: "One way is to practice slower breathing protocols outside of training and competition.",
            parts: [
                "In a performance realm, athletes can use breathing pace to manage their state of arousal.",
                "During training and competition, the breathing rate increases with the introduction of adrenaline.",
                "Athletes must be able to control this to be able to adapt and recover.",
                "This skill allows for a more rapid transition between high intensity and deep rest.",
                "Proper recovery is what separates elite performers from the rest of the field.",
                "Focusing on the breath remains a fundamental pillar of athletic success."
            ],
            answer: 3, // ④번 위치
            expl: "선수가 각성 상태를 조절해야 한다는 필요성(③번 앞)을 언급한 뒤, 그 방법론(One way)을 구체적으로 제시하는 ④번 위치가 논리적으로 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 호흡의 흐름을 잘 읽으셨네요. 🫁";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 고른 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 번호 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
