<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (영양 정보 신뢰성 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">주어진 문장이 들어갈 번호를 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "However, 75% of consumers rely on media outlets including the Internet as their major sources of health and nutrition information, and only half use medical sources.",
            parts: [
                "Consumer surveys indicate that the majority of Americans (91%) believe they have some control over their health, and 72% believe that food and nutrition play the greatest role.",
                "A Google search for “nutrition listservs” yielded over 100,000 sites, but it is likely that many of these writings are not reviewed by nutrition experts.",
                "Internet sites marketing herbs, drugs, and health devices are not monitored by government regulatory agencies and often contain misleading information.",
                "Reputable food companies provide helpful facts about the nutrient content of their products, but commercial sites devoted to sales often post misleading health claims.",
                "Internet sites maintained by government agencies, universities, state extension services, and medical facilities provide evidence-based information.",
                "These platforms should be the first source for public information on foods, nutrition, and health."
            ],
            answer: 1, // ①번 뒤 (②번 위치)
            expl: "영양과 건강이 중요하다는 인식(①번 앞)과는 대조적으로('However'), 대다수가 의료 전문가가 아닌 인터넷 매체에 의존한다는 문제 제기가 이어지는 ②번 위치가 가장 적합합니다."
        },
        {
            box: "Internet sites marketing herbs, drugs, and health devices are not monitored by government regulatory agencies and often contain misleading information.",
            parts: [
                "Consumer surveys indicate that Americans believe nutrition plays a great role in health. However, 75% rely on the Internet as their major information source.",
                "A Google search for “nutrition listservs” yielded over 100,000 sites, but it is likely that many of these writings are not reviewed by nutrition experts.",
                "Reputable food companies provide helpful facts about their products, but commercial sites devoted to sales often post misleading health claims.",
                "Internet sites maintained by government agencies, universities, and medical facilities provide evidence-based information.",
                "These resources should be prioritized for reliable information on foods, nutrition, and health.",
                "By choosing verified sources, consumers can better manage their personal health goals."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "인터넷 정보가 전문가의 검토를 거치지 않았을 가능성(②번 앞)에 이어, 정부 기관의 감시를 받지 않는 상업적 사이트의 위험성을 추가로 열거하는 ③번 위치가 정답입니다."
        },
        {
            box: "Reputable food companies provide helpful facts about the nutrient content of their products, but commercial sites devoted to sales often post misleading health claims.",
            parts: [
                "Consumer surveys indicate that 72% of Americans believe nutrition plays a great role. However, 75% rely on media outlets for information.",
                "Internet sites marketing herbs and health devices are not monitored by government agencies and often contain misleading information.",
                "In contrast, some organizations offer a higher level of transparency and data accuracy.",
                "Internet sites maintained by government agencies, universities, state extension services, and medical facilities provide evidence-based information.",
                "These sources should be the first point of contact for public information on nutrition and health.",
                "Relying on such authoritative data ensures a more accurate understanding of dietary needs."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "정부 감시가 없는 위험한 사이트들(②번 앞)에 대한 설명 뒤에, '평판 좋은 식품 회사'와 '상업적 판매 사이트'를 대조하며 정보의 신뢰성 차이를 구체화하는 ③번 위치가 적합합니다."
        },
        {
            box: "Internet sites maintained by government agencies, universities, state extension services, and medical facilities provide evidence-based information.",
            parts: [
                "Consumer surveys show high reliance on Internet health information despite a lack of expert review.",
                "Many sites are not monitored and often contain misleading health claims.",
                "Reputable food companies provide facts, but commercial sales sites often post misleading claims.",
                "They should be the first source for public information on foods, nutrition, and health.",
                "Accessing these sites helps consumers distinguish between marketing and medical facts.",
                "Ensuring information quality is vital for maintaining long-term wellness."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "신뢰할 수 없는 상업적 정보들(③번 앞)에 대한 언급을 마무리하고, 신뢰할 수 있는 '정부, 대학, 의료 시설' 사이트라는 대안을 제시하는 ④번 위치가 정답입니다. 뒤의 'They(이 기관들)'와 연결됩니다."
        },
        {
            box: "A Google search for “nutrition listservs” yielded over 100,000 sites, but it is likely that many of these writings are not reviewed by nutrition experts.",
            parts: [
                "Consumer surveys indicate that 72% of Americans believe nutrition plays a great role. However, 75% rely on media outlets as their major information source.",
                "Internet sites marketing herbs and drugs are not monitored and often contain misleading information.",
                "Reputable food companies provide helpful facts about the nutrient content of their products.",
                "Internet sites maintained by government agencies provide evidence-based information and should be the first source for public information.",
                "This vast array of digital data can often be overwhelming and confusing for the average consumer.",
                "Without proper guidance, navigating these websites may lead to poor health decisions."
            ],
            answer: 1, // ①번 뒤 (②번 위치)
            expl: "인터넷 매체에 의존한다는 일반적 사실(①번 앞) 뒤에, 구체적인 구글 검색 결과 수치와 함께 그 정보들이 전문가의 검증을 받지 못했다는 구체적인 문제를 제기하는 ②번 위치가 가장 적절합니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 정확한 정보를 판별해내셨네요. 🔎";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 클릭한 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 번호 초록색 표시
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
