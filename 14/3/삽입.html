<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (음악 감독과 관객 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "Yet listening audiences are rarely aware of any musical leadership, and for good aesthetic reason.",
            parts: [
                "The idea of music direction, in the sense of someone shaping and leading a musical performance, goes back to the beginnings of music.",
                "Even the gamelans of ancient Indonesia had leaders who would signal to the group changes of meter and tempo.",
                "They need not be aware to fulfill their experience; indeed, the unnecessarily conspicuous presence of a musical leader will detract from it.",
                "An audience is better off, for the most part, taking in the whole of a stage work rather than being party to the techniques.",
                "This is not to say that when an orchestra plays alone the audience members’ eyes are not fixed on the conductor.",
                "When music is accompanying something happening on stage, however, all eyes turn to the stage."
            ],
            answer: 2, // ③번 위치
            expl: "음악 감독의 역사적 기원과 가믈란의 예시(②번 앞)를 설명한 뒤, '하지만(Yet)' 청중은 그러한 지도력을 거의 의식하지 못한다는 내용이 오는 ③번 위치가 정답입니다. 뒤의 'They need not be aware'와 직접 연결됩니다."
        },
        {
            box: "They need not be aware to fulfill their experience; indeed, the unnecessarily conspicuous presence of a musical leader will detract from it.",
            parts: [
                "The gamelans of ancient Indonesia had leaders who would signal to the group changes of meter and tempo.",
                "Yet listening audiences are rarely aware of any musical leadership, and for good aesthetic reason.",
                "An audience is better off, for the most part, taking in the whole of a stage work rather than being party to the techniques that go into realizing it.",
                "This is not to say that when an orchestra plays alone the audience members’ eyes are not fixed on the conductor.",
                "When music is accompanying something happening on stage, however, all eyes turn to the stage.",
                "The conductor's role becomes secondary to the visual and emotional narrative unfolding before the audience."
            ],
            answer: 2, // ③번 위치
            expl: "관객이 지도력을 의식하지 않는 '미학적 이유'가 있다는 언급(②번 앞) 바로 다음에, 왜 의식할 필요가 없는지(경험 충족을 위해) 부연 설명하는 ③번 위치가 적합합니다."
        },
        {
            box: "This is not to say that when an orchestra plays alone the audience members’ eyes are not fixed on the conductor for the majority of the time; they probably are.",
            parts: [
                "Yet listening audiences are rarely aware of any musical leadership, and for good aesthetic reason.",
                "An audience is better off, for the most part, taking in the whole of a stage work rather than being party to the techniques.",
                "When music is accompanying something happening on stage, however, all eyes turn to the stage, and so do everyone’s ears, too.",
                "The music director’s attention is also focused on the actors and the flow of the performance.",
                "This synchronization between sight and sound creates a unified artistic experience.",
                "Ultimately, the goal is for the audience to lose themselves in the world of the music and theater."
            ],
            answer: 2, // ③번 위치
            expl: "관객이 기술적 구현보다는 작품 전체를 감상하는 것이 낫다는 설명(②번 앞) 뒤에, 오케스트라 단독 공연 시 지휘자를 주시하는 일반적인 상황을 예외로 언급하는 ③번 위치가 정답입니다. 뒤의 'stage(무대)' 상황과 대조를 이룹니다."
        },
        {
            box: "When music is accompanying something happening on stage, however, all eyes turn to the stage, and so do everyone’s ears, too (including the music director’s).",
            parts: [
                "An audience is better off taking in the whole of a stage work rather than the techniques that realize it.",
                "When an orchestra plays alone, the audience members’ eyes are fixed on the conductor for the majority of the time.",
                "This shift in focus ensures that the musical elements serve the dramatic action perfectly.",
                "The conductor must be acutely aware of the actors' timing to maintain this seamless integration.",
                "When done correctly, the audience is unaware of the complex coordination required behind the scenes.",
                "The result is a performance where music and drama appear as a single, natural entity."
            ],
            answer: 2, // ③번 위치
            expl: "오케스트라 단독 공연에서 지휘자를 보는 상황(②번 앞)과 대조적으로('however'), 무대 공연이 동반될 때 관객(및 감독)의 시선과 귀가 모두 무대로 향한다는 내용을 담은 ③번 위치가 정답입니다."
        },
        {
            box: "Even the gamelans of ancient Indonesia had leaders who would signal to the group changes of meter and tempo, beginnings and endings, and transitions from piece to piece.",
            parts: [
                "The idea of music direction, in the sense of someone shaping and leading a musical performance, goes back to the beginnings of music.",
                "Yet listening audiences are rarely aware of any musical leadership, and for good aesthetic reason.",
                "They need not be aware to fulfill their experience; indeed, a conspicuous leader will detract from it.",
                "An audience is better off taking in the whole of a stage work rather than the techniques.",
                "When an orchestra plays alone, the eyes are fixed on the conductor; but on stage, all eyes turn to the actors.",
                "Musical leadership remains essential but often invisible to ensure the highest artistic impact."
            ],
            answer: 1, // ②번 위치
            expl: "음악 감독의 아이디어가 음악의 시작과 함께했다는 첫 문장(①번 뒤)에 대해, 고대 인도네시아 가믈란이라는 역사적인 구체적 예시를 제시하는 ②번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 지휘자의 보이지 않는 손길을 잘 찾아내셨네요. 🎼";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
