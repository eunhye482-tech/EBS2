<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (과학적 발견과 공로 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "Bruno Latour describes how scientists arrived at the elucidation of TRF (thyrotropin-releasing factor), a hormone that is secreted by the brain.",
            parts: [
                "A detailed anthropological study of daily scientific practice in the Salk Institute laboratory shows how difficult it is to assign credit and dates.",
                "He says that his observations led him to “the conviction that a body of practices consists of a disordered array of observations.”",
                "The final consensus formulation of TRF emerged some time between January 1968 and January 1970.",
                "Half of the Nobel Prize in Medicine for 1977 for this discovery was shared between the Salk group and another competing group.",
                "Each of these two competing groups strongly felt that they deserved sole credit.",
                "The dispute highlights the messy reality of scientific recognition."
            ],
            answer: 1, // ①번 뒤 (②번 위치)
            expl: "공로 배분과 날짜 지정의 어려움을 언급한 첫 문장(①번 뒤) 직후에, 인류학자 브루노 라투르가 TRF 발견 과정을 어떻게 묘사했는지 도입하는 ②번 위치가 가장 자연스럽습니다."
        },
        {
            box: "The final consensus formulation of TRF (i.e., when it became a scientific “fact”) emerged some time between January 1968 and January 1970.",
            parts: [
                "Bruno Latour describes how scientists struggled to produce order out of a disordered array of observations in the lab.",
                "He notes that what outsiders see as well organized is actually a chaotic process of discovery.",
                "Half of the Nobel Prize in Medicine for 1977 for this discovery was shared between the Salk group and another competing group.",
                "The Salk group and the New Orleans group had been racing for years to reach this milestone.",
                "Each group strongly felt that the other did not deserve even a share of the award.",
                "This friction is typical when high-stakes intellectual property is involved."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "과학자들이 질서를 만들어내기 위해 고군분투했다는 과정 설명(②번 앞)이 끝나고, 그 결과물인 TRF가 언제 '과학적 사실'로 확립되었는지 시점을 명시하는 ③번 위치가 정답입니다."
        },
        {
            box: "Half of the Nobel Prize in Medicine for 1977 for this discovery was shared between the Salk group and another competing group in New Orleans.",
            parts: [
                "Scientists arrived at the elucidation of TRF through a process that outsiders might find disorganized.",
                "The final consensus formulation of TRF emerged some time between January 1968 and January 1970.",
                "Each of these 두 competing groups strongly felt that they deserved sole credit and that the other did not deserve even a share.",
                "The other half went to Rosalind Yalow for the techniques she developed that were used in these studies.",
                "This division of the prize attempted to acknowledge all the major contributors to the field.",
                "However, the bitterness between the labs remained a part of scientific folklore for decades."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "TRF가 과학적 사실로 확립되었다는 내용(②번 앞) 뒤에, 그 발견에 대한 공식적 보상으로 '1977년 노벨 생리의학상'이 공동 수여되었다는 역사적 사실을 제시하는 ③번 위치가 정답입니다."
        },
        {
            box: "Each of these two competing groups strongly felt that they deserved sole credit and that the other did not deserve even a share of the award.",
            parts: [
                "The final consensus formulation of TRF emerged some time between 1968 and 1970.",
                "Half of the Nobel Prize in Medicine for 1977 was shared between the Salk group and a competing group in New Orleans.",
                "The other half went to Rosalind Yalow for the techniques she developed for these studies.",
                "This intense rivalry stems from the high value placed on individual priority in scientific discovery.",
                "It illustrates Latour's point that 'facts' are often born from intense social and political struggle.",
                "The credit for TRF remains a subject of debate in the history of endocrinology."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "노벨상이 공동 수여되었다는 소식(②번 앞) 바로 뒤에, 그 공동 수여에 대한 두 그룹의 강한 불만('자신만이 공로를 독차지해야 한다'는 생각)을 설명하는 ③번 위치가 정답입니다."
        },
        {
            box: "He says that his observations led him to “the conviction that a body of practices widely regarded by outsiders as well organized, logical, and coherent, in fact consists of a disordered array of observations with which scientists struggle to produce order.”",
            parts: [
                "A detailed anthropological study shows how difficult it is to assign credit and dates in scientific discovery.",
                "Bruno Latour describes how scientists arrived at the elucidation of TRF, a hormone secreted by the brain.",
                "The final consensus formulation of TRF emerged some time between January 1968 and January 1970.",
                "Half of the Nobel Prize in Medicine for 1977 was shared between two competing groups.",
                "Each group felt that they alone deserved the award for the discovery.",
                "This competition underscores the social nature of what we consider objective scientific truth."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "브루노 라투르가 TRF 발견 과정을 묘사했다는 문장(②번 앞) 뒤에, 그의 구체적인 관찰 내용(외부 시각과 달리 내부 실상은 무질서한 관찰의 나열이라는 점)을 설명하는 ③번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 과학적 발견의 이면을 잘 통찰하셨네요. 🔬";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택한 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 번호 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>
