<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (배경지식과 독해 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "The first group was made up of strong readers who knew little about baseball.",
            parts: [
                "The importance of what a reader brings to the page is highlighted in a study discussed by Hirsch in The Knowledge Deficit.",
                "This study consisted of two groups of students who were asked to read a passage about baseball.",
                "The second group was composed of struggling readers who were knowledgeable about baseball.",
                "After reading the passage, students in each group had their comprehension tested.",
                "Guess which group scored higher? The struggling readers.",
                "Prior knowledge, or, in the case of the good readers, the lack of prior knowledge, was the x-factor."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "두 그룹의 학생들을 대상으로 야구에 관한 지문을 읽게 했다는 설명(②번 앞) 바로 다음에, 그중 첫 번째 그룹의 특징(글은 잘 읽지만 야구 지식은 없음)을 설명하는 ③번 위치가 정답입니다. 뒤의 'The second group'과 짝을 이룹니다."
        },
        {
            box: "Guess which group scored higher? The struggling readers.",
            parts: [
                "The first group was made up of strong readers who knew little about baseball.",
                "The second group was composed of struggling readers who were knowledgeable about baseball.",
                "After reading the passage, students in each group had their comprehension tested.",
                "Having strong reading skills was not enough for the students who came to the page with a knowledge deficit.",
                "Though the second group were not strong readers, their prior knowledge enabled them to outscore readers with far better abilities.",
                "This surprising outcome underscores the critical role of background information in literacy."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "두 그룹의 이해도 테스트를 진행했다는 설명(③번 앞) 뒤에, 그 결과를 질문과 답변 형식(어떤 그룹이 더 높았을까? 독해력이 부족한 독자들이다)으로 제시하는 ④번 위치가 적합합니다."
        },
        {
            box: "Having strong reading skills was not enough for the students who came to the page with a knowledge deficit about the topic.",
            parts: [
                "The first group was strong readers with little baseball knowledge, while the second group was struggling readers with high knowledge.",
                "After comprehension tests, the struggling readers outscored the strong readers.",
                "Guess which group scored higher? The struggling readers.",
                "Though the second group of readers were not strong readers, their prior knowledge enabled them to outscore readers with far better abilities.",
                "Prior knowledge, or, in the case of the good readers, the lack of prior knowledge, was the x-factor.",
                "This finding suggests that literacy is deeply intertwined with factual understanding."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "독해력이 부족한 학생들이 더 높은 점수를 받았다는 결과(③번 앞)에 대한 분석으로서, '독해 기술만으로는 지식 부족(knowledge deficit)을 메울 수 없었다'는 내용을 담은 ④번 위치가 정답입니다."
        },
        {
            box: "Though the second group of readers were not strong readers, their prior knowledge enabled them to outscore readers with far better abilities.",
            parts: [
                "The struggling readers outscored the strong readers in the baseball passage test.",
                "Having strong reading skills was not enough for the students who came to the page with a knowledge deficit about the topic.",
                "Prior knowledge, or, in the case of the good readers, the lack of prior knowledge, was the x-factor.",
                "This highlights the importance of what a reader brings to the page.",
                "Knowledge serves as a scaffold upon which new information is built.",
                "Without this foundation, even the most advanced decoding skills may falter."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "독해 기술만으로는 부족했다는 일반적 분석(②번 앞) 뒤에, 다시 한번 '배경지식이 독해 능력이 훨씬 좋은 이들을 능가하게 했다'는 핵심 대조를 정리하며 결론으로 이끄는 ③번 위치가 정답입니다."
        },
        {
            box: "Prior knowledge, or, in the case of the good readers, the lack of prior knowledge, was the x-factor.",
            parts: [
                "After reading the passage, students in each group had their comprehension tested.",
                "The struggling readers outscored the strong readers because of their knowledge about baseball.",
                "Having strong reading skills was not enough for students with a knowledge deficit.",
                "Though the second group were not strong readers, their prior knowledge enabled them to outscore others.",
                "This study provides a clear argument for including content-rich curriculum in schools.",
                "When students possess the necessary context, their literacy skills are significantly amplified."
            ],
            answer: 4, // ④번 뒤 (⑤번 위치)
            expl: "지식의 유무가 결과의 핵심이었다는 분석들(④번 앞)을 모두 마친 후, 결국 '배경지식(또는 그 부족)'이 결정적인 변수인 'x-factor'였다고 글의 주제를 요약하는 ⑤번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 배경지식의 힘을 완벽히 이해하셨네요. ⚾";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택한 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 번호 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
