<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (경험과 의미 공유 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "These differences are most glaring when the individuals involved include an infant or very young child and an adult.",
            parts: [
                "Sharing meanings and experiences is not a simple, automatic process.",
                "Whenever two or more people observe or participate in the same ongoing event they experience it from different perspectives.",
                "An adult arranging an event for an infant may find it difficult to keep these differences in mind.",
                "When giving a bath, for example, a parent expects the infant to enjoy splashing water.",
                "Yet the baby may make it clear (perhaps by terrified crying) that her perspective is quite different.",
                "The two share an experience, but not a meaning."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "사람마다 경험과 지식이 달라 관점이 다르다는 일반적인 설명(②번 앞) 뒤에, 그 차이가 가장 '확연한(glaring)' 경우로 영유아와 성인의 사례를 도입하는 ③번 위치가 정답입니다. 뒤의 'these differences'와 논리적으로 연결됩니다."
        },
        {
            box: "When giving a bath, for example, a parent whose experience with water play has been fun, expects the infant to enjoy splashing water.",
            parts: [
                "Sharing meanings is complex because people experience events from different perspectives.",
                "These differences are most glaring when the individuals include an infant and an adult.",
                "An adult arranging an event for an infant may find it difficult to keep these differences in mind.",
                "Yet the baby may make it clear (perhaps by terrified crying) that her perspective is quite different from that of the adult.",
                "The two share an experience, but not a meaning.",
                "This emotional mismatch highlights the gap between parental expectations and infant reality."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "성인이 영유아와의 관점 차이를 망각하기 쉽다는 언급(③번 앞) 뒤에, '목욕시키기'라는 구체적인 '예시(for example)'를 통해 성인의 즐거운 기대를 설명하는 ④번 위치가 정답입니다."
        },
        {
            box: "Yet the baby may make it clear (perhaps by terrified crying) that her perspective is quite different from that of the adult.",
            parts: [
                "Whenever people participate in the same event, they experience it from different perspectives.",
                "When giving a bath, a parent whose body control ensures safety expects the infant to enjoy splashing water.",
                "The two share an experience, but not a meaning.",
                "Understanding this discrepancy is the first step toward more sensitive caregiving.",
                "The adult must learn to read the child's cues to align their shared environment with the child's internal state.",
                "Empathy allows the adult to see the water not as a toy, but as a potential source of fear for the child."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "즐거운 물놀이를 기대하는 성인의 관점(②번 앞)과 대조적으로('Yet'), 공포에 질려 우는 아기의 상반된 관점을 제시하는 ③번 위치가 정답입니다."
        },
        {
            box: "The two share an experience, but not a meaning.",
            parts: [
                "Sharing meanings and experiences is not a simple, automatic process.",
                "When giving a bath, a parent expects the infant to enjoy splashing water based on their own confidence.",
                "Yet the baby may make it clear that her perspective is quite different from that of the adult.",
                "This fundamental disconnect is why communication with infants requires such careful observation.",
                "Meaning is constructed internally, not simply transmitted through the physical event itself.",
                "True connection only happens when both parties' perspectives are acknowledged and bridged."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "성인과 아기의 상반된 반응(③번 앞)을 토대로, 같은 물리적 경험을 하더라도 그것에 부여하는 '의미'는 전혀 다를 수 있다는 지문의 핵심 요약 결론이 들어가는 ④번 위치가 정답입니다."
        },
        {
            box: "Whenever two or more people observe or participate in the same ongoing event they experience it from different perspectives, with different histories, with different background knowledge.",
            parts: [
                "Sharing meanings and experiences is not a simple, automatic process.",
                "These differences are most glaring when the individuals involved include an infant and an adult.",
                "An adult arranging an event for an infant may find it difficult to keep these differences in mind.",
                "When giving a bath, for example, a parent expects the infant to enjoy splashing water.",
                "Yet the baby may make it clear (perhaps by terrified crying) that her perspective is quite different.",
                "The two share an experience, but not a meaning."
            ],
            answer: 1, // ①번 뒤 (②번 위치)
            expl: "경험 공유가 단순하지 않다는 첫 문장(①번 앞)에 대해, 왜 그런지 그 이유(개인마다 다른 역사와 지식, 관점)를 설명하는 ②번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 타인의 관점을 완벽히 이해하셨네요. 👶";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 번호 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
