<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (글쓰기 전략 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "Instead, you need to tell us up front: “I proved this! And here’s how I know it...”",
            parts: [
                "In academia, you are taught to write your results in a narrative way: “I came up with a hypothesis... until ta-da! I proved this.”",
                "If you wrote this way online, very few readers would make it to your dramatic conclusion.",
                "Online, we don’t have the patience to wait for your big reveal at the end.",
                "Your readership may still dwindle over the course of your writing, but at least they know what you’ve achieved from the beginning.",
                "A few more of them may stay along for the ride if the opening line—the “hook”—is particularly interesting.",
                "If you grab their attention early, you can more likely convince more readers to stay for the whole story."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "온라인 독자들은 결론이 나올 때까지 기다릴 인내심이 없다는 내용(②번 앞) 뒤에, '대신에(Instead)' 결론부터 말하는 두괄식 쓰기를 제안하는 ③번 위치가 정답입니다."
        },
        {
            box: "Your readership may still dwindle and trail off over the course of your writing, but at least the vast majority know what it is you’ve achieved from the beginning.",
            parts: [
                "Online readers don't have the patience to wait for a big reveal at the end of an article.",
                "Instead, you need to tell them up front: “I proved this! And here’s how I know it...”",
                "A few more of them may stay along for the ride if the opening line—the “hook”—is particularly interesting.",
                "If you grab their attention early, you can more likely convince more readers to stay for the whole story.",
                "This inverted pyramid style is essential for capturing attention in a world full of distractions.",
                "The core message must be delivered before the user's attention span reaches its limit."
            ],
            answer: 1, // ①번 뒤 (②번 위치)
            expl: "결론부터 말하라는 전략(①번 앞)에 대한 부연 설명으로, 비록 독자가 중간에 줄어들지라도 결론은 확실히 전달될 수 있다는 이점을 설명하는 ②번 위치가 적합합니다."
        },
        {
            box: "A few more of them may stay along for the ride if the opening line—the “hook,” in journalistic terms—is particularly interesting.",
            parts: [
                "Instead of a slow build, you need to tell us up front what you achieved.",
                "Even if readers trail off later, they will know your main achievement from the very beginning.",
                "If you grab their attention early, you can more likely convince more readers to stay for the whole story.",
                "A well-crafted hook acts as a filter, attracting the audience that will value your findings most.",
                "Journalists have used this technique for decades to maintain high levels of engagement.",
                "Effective digital communication relies on this immediate value proposition."
            ],
            answer: 1, // ①번 뒤 (②번 위치)
            expl: "결론을 미리 알렸을 때의 이점(①번 앞) 뒤에, 특히 '훅(hook)'이라 불리는 첫 문장이 흥미롭다면 독자들이 더 오래 머무를 수 있다는 추가 팁을 제시하는 ②번 위치가 정답입니다."
        },
        {
            box: "If you grab their attention early, you can more likely convince more readers to stay for the whole story.",
            parts: [
                "Online, you need to tell us up front: “I proved this! And here’s how I know it...”",
                "At least the vast majority know what it is you’ve achieved from the very beginning.",
                "A few more may stay if the opening line—the “hook”—is particularly interesting.",
                "This strategy is not just about convenience; it's about respecting the reader's time.",
                "In a crowded information market, clarity and speed are the most valuable currencies.",
                "By leading with the conclusion, you demonstrate confidence in the value of your work."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "흥미로운 첫 문장(hook)의 중요성(②번 앞)을 요약하며, 초기에 시선을 사로잡는 것이 전체 이야기를 읽게 만드는 가장 좋은 방법임을 결론짓는 ③번 위치가 정답입니다."
        },
        {
            box: "If you wrote this way online, very few of your readers would make it to your dramatic conclusion, no matter how exciting or groundbreaking it was.",
            parts: [
                "In academia, you are taught to write your results in a narrative way leading up to a “ta-da” moment.",
                "Online, we don’t have the patience to wait for your big reveal at the end.",
                "Instead, you need to tell us up front: “I proved this!”",
                "Your readership may dwindle, but the vast majority will know what you’ve achieved.",
                "A few more may stay if the hook is particularly interesting.",
                "Leading with the punchline ensures that your most important information is always seen."
            ],
            answer: 1, // ①번 뒤 (②번 위치)
            expl: "학술적인 '기승전결' 방식의 글쓰기(①번 앞)를 온라인에서 그대로 적용했을 때 발생할 수 있는 문제점(독자가 끝까지 읽지 않음)을 지적하는 ②번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 온라인 글쓰기의 핵심을 간파하셨네요. ✍️";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택한 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 번호 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
