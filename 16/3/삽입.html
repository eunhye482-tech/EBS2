<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (비르 타윌 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "The combination of these two intersecting lines brought about the creation of two new areas: the large, inhabitable coastal area called the Hala’ib Triangle and an empty, landlocked patch of desert, which is Bir Tawil.",
            parts: [
                "Bir Tawil is a strange place. In January 1899, administrators of the British Empire decided to finalize a border between Egypt and Sudan using the straight line of the twenty-second parallel.",
                "Unsurprisingly, this new international border arbitrarily tore through local tribes and communities.",
                "In 1902, the British drew a new line to reflect tribal territories, resulting in a conflicting administrative boundary.",
                "To keep the desirable Hala’ib, Egypt claimed the original, straight border of 1899.",
                "Sudan—with the same goal in mind—claimed the new 1902 line instead.",
                "This conflict means both countries refuse to claim Bir Tawil, making it a piece of land no country wants."
            ],
            answer: 2, // ③번 위치
            expl: "1899년의 직선 경계와 1902년의 부족 경계라는 '두 선'에 대한 언급(②번 뒤)이 완료된 후, 이 두 선의 교차로 인해 발생한 두 지역(할라이브와 비르 타윌)을 명시하는 ③번 위치가 정답입니다."
        },
        {
            box: "To keep the desirable Hala’ib, Egypt understandably claimed the original, straight border of 1899, whereas Sudan—with the same goal in mind—claimed the new 1902 line.",
            parts: [
                "The combination of intersecting lines created the large Hala’ib Triangle and the empty desert of Bir Tawil.",
                "Hala'ib is a valuable coastal area, while Bir Tawil is a landlocked patch of desert.",
                "The strange result of this long-standing conflict is that both countries refuse to claim Bir Tawil.",
                "Doing so would mean giving up a greater prize, which neither side is willing to do.",
                "Bir Tawil is roughly the size of London, yet it remains functionally terra nullius.",
                "This make Bir Tawil the largest piece of land that no country wants."
            ],
            answer: 2, // ③번 위치
            expl: "두 지역이 생성되었다는 지리적 설명(②번 앞)과 두 국가가 비르 타윌을 거부한다는 결과(③번 뒤) 사이에서, 왜 그런 결과가 나왔는지 '국가별 주장'을 설명하는 ③번 위치가 정답입니다."
        },
        {
            box: "The strange result of this long-standing conflict is that, to this day, both countries refuse to claim Bir Tawil, an area of land roughly the size of London, as it would mean giving up a greater prize.",
            parts: [
                "In 1902, the British drew a new line to reflect tribal territories, differing from the 1899 parallel.",
                "Egypt claimed the 1899 border to keep Hala'ib, while Sudan claimed the 1902 line for the same reason.",
                "This makes Bir Tawil the largest—perhaps the only—piece of land that no country wants.",
                "The international community views this situation as a unique legal anomaly in modern geography.",
                "Despite several attempts by individuals to claim the land as a micronation, it has no official recognition.",
                "The desert remains silent, caught between two competing definitions of national identity."
            ],
            answer: 2, // ③번 위치
            expl: "이집트와 수단의 서로 다른 영토 주장(②번 앞)으로 인해 발생한 '이상한 결과'를 제시하며 비르 타윌의 특수성을 설명하는 ③번 위치가 정답입니다."
        },
        {
            box: "Unsurprisingly, this new international border arbitrarily tore through local tribes and communities.",
            parts: [
                "In January 1899, British administrators finalized a border between Egypt and Sudan using the straight line of the twenty-second parallel.",
                "In 1902, the British drew a new line to reflect tribal territories, moving away from the purely geometric approach.",
                "The combination of these intersecting lines brought about the creation of two new areas: Hala'ib and Bir Tawil.",
                "Egypt understandably claimed the original 1899 border, while Sudan claimed the 1902 line.",
                "Both countries refuse to claim Bir Tawil to avoid losing the larger prize of the Hala’ib Triangle.",
                "The land remains unclaimed by any sovereign state to this very day."
            ],
            answer: 1, // ②번 위치
            expl: "1899년의 직선 국경 결정(①번 뒤)이 가져온 부정적인 영향(부족 공동체의 분열)을 설명하는 ②번 위치가 가장 적합합니다. 이후 이를 해결하기 위해 1902년에 새로운 선을 그었다는 흐름으로 이어집니다."
        },
        {
            box: "Sudan—with the same goal in mind—claimed the new 1902 line.",
            parts: [
                "The combination of intersecting lines created two distinct areas: the Hala’ib Triangle and Bir Tawil.",
                "To keep the desirable Hala’ib, Egypt understandably claimed the original, straight border of 1899.",
                "The strange result of this long-standing conflict is that both countries refuse to claim Bir Tawil.",
                "This makes Bir Tawil the largest piece of land that no country wants.",
                "It is a barren landscape, yet it holds a unique position in the annals of international law.",
                "No other place on Earth shares this specific type of dual rejection."
            ],
            answer: 2, // ③번 위치
            expl: "이집트의 주장(②번 앞)에 이어, '같은 목표를 가진 수단'의 상반된 주장을 제시하는 ③번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 역사적인 영토 분쟁의 맥락을 완벽히 이해하셨네요. 🗺️";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택한 오답은 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 번호는 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
