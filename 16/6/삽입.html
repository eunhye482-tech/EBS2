<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (공공재와 습지 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "As a result, there is no “market” and thus no “price” for these public good uses of wetlands.",
            parts: [
                "Public goods are undervalued in markets, which exist for private goods but rarely for public goods.",
                "Aquatic habitats such as wetlands provide diverse benefits, including breeding, refuge, and purification of water.",
                "These benefits are enjoyed simultaneously by many people and are provided to them for “free” by nature.",
                "But the actual value of these services is not zero.",
                "Because many people benefit, their value is the total additional benefits of all individuals who enjoy them.",
                "This gap between the zero price and actual value indicates how much these public goods are undervalued."
            ],
            answer: 3, // ③번 위치
            expl: "습지의 혜택이 자연에 의해 '무료'로 제공된다는 설명(②번 뒤)의 결과(As a result)로서, 시장과 가격이 존재하지 않는다는 결론이 이어지는 ③번 위치가 정답입니다."
        },
        {
            box: "But the actual value of these services is not zero.",
            parts: [
                "Public goods like wetlands provide diverse benefits enjoyed simultaneously by many people.",
                "These services are provided for “free,” resulting in no market or price for these public good uses.",
                "Because many people benefit from these services, their value is the total additional benefits of all individuals.",
                "This value could be huge, even though there is no apparent “market price” for these wetland services.",
                "The invisibility of these benefits in financial records often leads to poor environmental policy decisions.",
                "Recognizing the true worth of natural habitats is essential for sustainable resource management."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "습지의 가격이 '0'이라는 언급(②번 앞) 뒤에, '하지만(But)' 실제 가치는 결코 0이 아니라는 반전의 내용을 도입하는 ③번 위치가 정답입니다."
        },
        {
            box: "This value could be huge, even though there is no apparent “market price” for these wetland services.",
            parts: [
                "Wetlands provide benefits that are enjoyed for free, leading to a lack of market prices.",
                "But the actual value is the total additional benefits of all individuals who enjoy provision of these services.",
                "This gap between the (zero) price and actual value indicates how much public goods are undervalued.",
                "Market failures often occur because the collective interest is not reflected in individual transactions.",
                "Protecting wetlands requires moving beyond traditional market logic to capture their full ecological impact.",
                "Policy makers must find ways to internalize these positive externalities to ensure habitat preservation."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "모든 개인이 누리는 혜택의 총합이 가치라는 설명(②번 앞)에 이어, 그 가치가 '거대할 수 있다(huge)'는 결론을 내리는 ③번 위치가 적합합니다."
        },
        {
            box: "This gap between the (zero) price for wetland services and their actual value to all beneficiaries indicates how much these public goods are undervalued in markets.",
            parts: [
                "Wetland services are provided for free by nature, so they have no apparent market price.",
                "Their actual value is not zero but the sum of all individual benefits from these services.",
                "This value could be huge, even though there is no apparent market price for these wetland services.",
                "The lack of financial incentive often leads to the conversion of wetlands for private commercial use.",
                "Such actions may benefit a few but result in a massive net loss for society as a whole.",
                "Economic models must evolve to account for the non-market contributions of our natural environment."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "시장 가격의 부재와 거대한 실제 가치 사이의 모순(③번 앞)을 요약하며, 이것이 바로 공공재가 시장에서 '과소평가'되고 있음을 보여준다는 지문의 최종 결론인 ④번 위치가 정답입니다."
        },
        {
            box: "Because many people benefit from these services, their value is the total additional benefits of all individuals who enjoy provision of these services by wetlands.",
            parts: [
                "Wetlands provide diverse benefits for free, meaning there is no market or price for these uses.",
                "But the actual value of these services is not zero, despite the lack of a price tag.",
                "This value could be huge, even though there is no apparent “market price” for these services.",
                "This gap between the zero price and actual value shows how much these public goods are undervalued.",
                "Traditional accounting methods fail to capture the shared wealth produced by healthy ecosystems.",
                "A more holistic approach to valuation is needed to prevent the degradation of these vital habitats."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "가치가 0이 아니라는 주장(②번 앞) 뒤에, 구체적으로 그 가치를 어떻게 산정하는지(수혜자들의 총 혜택)를 설명하는 ③번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 경제와 환경의 균형 잡힌 시각을 보여주셨네요. 🌿";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택한 오답은 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 번호는 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>
</body>
</html>
