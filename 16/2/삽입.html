<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (대리적 기능 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "For instance, migrating birds fly thousands of miles and may rely on the stars to navigate.",
            parts: [
                "The human perceptual system is designed to recognize objects under changing illuminations, situations, and contexts.",
                "To deal with this uncertainty, the brain uses not one, but multiple routes; if one is blocked, it takes another route.",
                "This immense flexibility of the brain to rely on changing cues is known as vicarious functioning, and it can be found in most biological systems.",
                "But if it’s a cloudy day, they may instead rely on landmarks or their magnetic sense.",
                "Similarly, the brain can recognize a face by the shape of the eyes, nose, and mouth, or even from a few lines in caricatures.",
                "Face recognition also functions even when internal features are hardly visible, by relying on external features like hair."
            ],
            answer: 3, // ③번 위치
            expl: "대리적 기능(vicarious functioning)이 대부분의 생물학적 시스템에서 발견된다는 설명(②번 뒤) 다음에, 철새의 이동이라는 '구체적인 사례'를 처음 도입하는 ③번 위치가 정답입니다. 뒤의 'But if it's a cloudy day'와 논리적으로 연결됩니다."
        },
        {
            box: "But if it’s a cloudy day, they may instead rely on landmarks or their magnetic sense.",
            parts: [
                "The brain uses multiple routes to deal with uncertainty; if one is blocked, it takes another route.",
                "This flexibility is known as vicarious functioning and is found in most biological systems.",
                "For instance, migrating birds fly thousands of miles and may rely on the stars to navigate.",
                "Similarly, the brain can recognize a face by the shape of the eyes, nose, and mouth.",
                "In extreme cases, only a few lines are sufficient, as when we recognize a celebrity in caricatures.",
                "Face recognition also functions by relying on external features such as hair and head shape when eyes are hardly visible."
            ],
            answer: 3, // ③번 위치
            expl: "철새가 별을 보고 길을 찾는다는 내용(②번 뒤) 바로 다음에, 구름이 낀 날이라는 '변수'가 생겼을 때의 대안적인 길 찾기 방식을 설명하는 ③번 위치가 정답입니다."
        },
        {
            box: "Similarly, the brain can recognize a face by the shape of the eyes, nose, and mouth.",
            parts: [
                "Vicarious functioning allows biological systems to rely on changing cues according to whatever is available.",
                "Migrating birds rely on stars, or landmarks and magnetic senses on cloudy days.",
                "In extreme cases, only a few lines are sufficient, as when we recognize the face of a celebrity in caricatures.",
                "Face recognition also functions even when parts of a face are covered and internal features are hardly visible.",
                "In this case, the brain relies on external features such as hair and head shape.",
                "This shows how our neural pathways adapt to partial information to maintain recognition."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "생물학적 사례(철새)에 대한 설명이 끝나고, '마찬가지로(Similarly)' 인간의 두뇌 지각(얼굴 인식) 사례로 넘어가는 ③번 위치가 정답입니다."
        },
        {
            box: "In extreme cases, only a few lines are sufficient, as when we recognize the face of a celebrity in caricatures made with just a few pencil strokes.",
            parts: [
                "The brain can recognize a face by the shape of the eyes, nose, and mouth through multiple perceptual routes.",
                "Similarly, the brain uses various cues to maintain recognition under changing conditions.",
                "Face recognition also functions even when parts of a face are covered and internal features are hardly visible.",
                "In this case, the brain relies on external features such as hair and head shape.",
                "These external cues provide enough structural data to bypass the missing internal information.",
                "Ultimately, the perceptual system prioritizes function over perfect data input."
            ],
            answer: 1, // ①번 뒤 (②번 위치)
            expl: "얼굴의 주요 특징으로 인식한다는 기본 원리(①번 뒤)에서 한 단계 더 나아가, 극단적인 경우(In extreme cases)인 캐리커처의 선 몇 개만으로도 인식이 가능하다는 점을 강조하는 ②번 위치가 적합합니다."
        },
        {
            box: "In this case, the brain relies on external features such as hair and head shape.",
            parts: [
                "The brain can recognize a face through caricatures or by the shape of the eyes, nose, and mouth.",
                "Face recognition also functions even when parts of a face are covered and internal features like eyes are hardly visible.",
                "This immense flexibility is what allows us to navigate a world of visual obstructions.",
                "Our ancestors likely relied on these same mechanisms to identify allies in low-light environments.",
                "Perceptual constancy remains a cornerstone of cognitive psychology and neural adaptation.",
                "It ensures that our mental map of the world remains stable despite sensory fluctuations."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "얼굴 부위가 가려져 내부 특징을 보기 어려운 상황(②번 앞)에 대한 구체적인 대응 방식('이 경우에' 머리카락이나 머리 모양 같은 외부 특징에 의존함)을 설명하는 ③번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 뇌의 놀라운 유연성을 잘 포착하셨네요. 🧠";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong');
            all[q.answer].classList.add('correct');
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
