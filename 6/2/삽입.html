<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (예술과 맥락 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "Consider a soda can found thrown away on a city street.",
            parts: [
                "When people are asked what any painting hanging on a gallery wall means, no matter how strange it might appear, they tend to find meaning in it because it is located in a gallery.",
                "If we were to come across this item on the street, we would no doubt view it as a piece of garbage or rubbish.",
                "But if we saw the very same object on a pedestal, displayed in an art gallery, signed by some artist, and given a title such as “Waste,” then we would interpret its meaning in a vastly different way.",
                "We would, in fact, be inclined to interpret it as an artistic form, descrying a throw-away or materialistic society.",
                "Clearly, the can’s location on a sidewalk versus its display on a pedestal in an art gallery will influence how we will interpret it.",
                "This context-driven interpretation is fundamental to our experience of modern art."
            ],
            answer: 1, // ①번 뒤 (②번 위치)
            expl: "갤러리라는 장소가 의미를 부여한다는 일반적 설명(①번 앞) 뒤에, 구체적인 예시로 '길거리에 버려진 탄산음료 캔'을 제시하는 ②번 위치가 가장 적절합니다. 뒤의 'this item'과 연결됩니다."
        },
        {
            box: "But if we saw the very same object on a pedestal, displayed in an art gallery, signed by some artist, and given a title such as “Waste,” then we would interpret its meaning in a vastly different way.",
            parts: [
                "When people are asked what any painting hanging on a gallery wall means, they tend to find meaning in it because it is located in a gallery.",
                "Consider a soda can found thrown away on a city street. If we were to come across this item on the street, we would view it as a piece of garbage.",
                "We would, in fact, be inclined to interpret it as an artistic form, descrying a throw-away or materialistic society.",
                "Clearly, the can’s location on a sidewalk versus its display in an art gallery will influence how we will interpret it.",
                "The shift in perception happens almost instantaneously upon changing the object's surrounding environment.",
                "Artistic meaning is thus as much about the space it occupies as the object itself."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "캔을 쓰레기로 보는 상황(②번 앞)과 대조적으로, 같은 물건이 갤러리에 전시될 때 해석이 달라진다는 내용을 담은 ③번 위치가 정답입니다."
        },
        {
            box: "We would, in fact, be inclined to interpret it as an artistic form, descrying a throw-away or materialistic society.",
            parts: [
                "Consider a soda can found thrown away on a city street. If we were to come across this item on the street, we would view it as rubbish.",
                "But if we saw the very same object on a pedestal, displayed in an art gallery, and given a title such as “Waste,” then we would interpret its meaning in a vastly different way.",
                "Clearly, the can’s location on a sidewalk versus its display on a pedestal in an art gallery will influence how we will interpret it.",
                "This illustrates how the institutional frame of a gallery dictates our aesthetic response.",
                "Objects that are mundane in everyday life can become profound within these curated walls.",
                "The artist's signature serves as a final seal of this transformative process."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "갤러리 전시로 인해 해석이 달라진다는 내용(②번 앞)을 구체화하여, 그것을 '물질주의 사회를 비판하는 예술적 형태'로 해석하게 된다는 보충 설명이 오는 ③번 위치가 적절합니다."
        },
        {
            box: "Clearly, the can’s location on a sidewalk versus its display on a pedestal in an art gallery will influence how we will interpret it.",
            parts: [
                "Consider a soda can found thrown away on a city street. If we were to come across this item on the street, we would view it as garbage.",
                "But if we saw the same object in an art gallery, given a title such as “Waste,” we would interpret it as an artistic form, descrying a throw-away society.",
                "The contrast between these two settings highlights the power of social institutions in defining art.",
                "We are conditioned to respond differently to objects based on the authority of their presentation.",
                "This phenomenon confirms that meaning is not inherent in the object but is constructed by its context.",
                "Therefore, the gallery functions as a filter through which we perceive artistic intent."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "캔이 놓인 두 장소(인도 vs 갤러리)에 따른 해석의 차이를 최종적으로 요약하고 강조하는 ③번 위치가 정답입니다."
        },
        {
            box: "When people are asked what any painting hanging on a gallery wall means, no matter how strange it might appear, they tend to find meaning in it because it is located in a gallery.",
            parts: [
                "Consider a soda can found thrown away on a city street. If we were to come across this item on the street, we would no doubt view it as garbage.",
                "But if we saw the same object on a pedestal in a gallery, signed by an artist and titled “Waste,” then we would interpret its meaning in a vastly different way.",
                "Clearly, the location of an object will influence how we will interpret its artistic form or materialistic nature.",
                "The museum or gallery setting acts as a signifier that says, 'This is worthy of your contemplation.'",
                "As a result, even the most mundane items can take on a sacred quality when placed within these structures.",
                "This psychological shift is what allows modern art to flourish and challenge our traditional definitions."
            ],
            answer: 0, // 첫 번째 번호 (①번 위치)
            expl: "글 전체의 대전제이자 도입부로서, 갤러리라는 장소 자체가 의미를 부여한다는 핵심 주장을 먼저 제시하는 ①번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 예술을 보는 안목이 탁월하시네요. 🎨";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택한 오답은 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 번호 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
