<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (시민권과 투표권 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "If the vote, of all rights, is in the hands of noncitizens, why should they not count as citizens, and the entire distinction between resident alien and citizen be abandoned?",
            parts: [
                "In the United States, the practice of permitting aliens to vote could be seen as compatible with the idea of an exclusionary citizenship, but that is a hard balance to maintain.",
                "Indeed, something like this thought probably lay behind the disappearance of alien voting.",
                "With universal adult citizen suffrage after 1920, the only way to maintain an exclusionary kind of citizenship was to restrict the vote to citizens and not residents.",
                "But no theory of “active” democracy can countenance this distinction.",
                "The laws concerning our common life must be made by all those who are taking part in it.",
                "Residence is the only convincing test of whether someone is taking part—as is understood almost universally in local government."
            ],
            answer: 1, // ②번 위치
            expl: "외국인 투표권 허용이 배타적 시민권 개념과 균형을 맞추기 어렵다는 지적(①번 앞) 뒤에, 투표권이 비시민권자에게 있다면 시민과의 구분이 무의미해진다는 의문을 던지는 ②번 위치가 적합합니다. 뒤의 'this thought'와 연결됩니다."
        },
        {
            box: "Indeed, something like this thought probably lay behind the disappearance of alien voting.",
            parts: [
                "In the United States, the practice of permitting aliens to vote could be seen as compatible with exclusionary citizenship, but it is a hard balance.",
                "If the vote is in the hands of noncitizens, why should the entire distinction between resident alien and citizen not be abandoned?",
                "With universal adult citizen suffrage after 1920, the only way to maintain exclusionary citizenship was to restrict the vote to citizens.",
                "But no theory of “active” democracy can countenance this distinction.",
                "The laws concerning our common life must be made by all those who are taking part in it.",
                "Residence is the only convincing test of whether someone is taking part in a shared community."
            ],
            answer: 2, // ③번 위치
            expl: "비시민권자에게 투표권을 주면 시민과의 구분이 사라진다는 생각(②번 앞)이 실제로 외국인 투표권 폐지의 배경이 되었다고 설명하는 ③번 위치가 정답입니다."
        },
        {
            box: "But no theory of “active” democracy can countenance this distinction.",
            parts: [
                "In the United States, after 1920, the only way to maintain an exclusionary kind of citizenship was to restrict the vote to citizens and not residents.",
                "This restriction created a clear legal boundary between who could and could not influence political decisions.",
                "The laws concerning our common life must be made by all those who are taking part in it.",
                "Residence is the only convincing test of whether someone is taking part—as is understood universally in local government.",
                "Democratic legitimacy relies on the inclusion of all those subject to the law.",
                "Exclusion based on nationality rather than residence undermines the principles of active participation."
            ],
            answer: 2, // ③번 위치
            expl: "시민과 거주자를 구분하여 투표권을 제한하는 방식(②번 앞)을 '능동적 민주주의' 이론에서는 용인할 수 없다고 반박을 시작하는 ③번 위치가 적합합니다."
        },
        {
            box: "The laws concerning our common life must be made by all those who are taking part in it.",
            parts: [
                "With universal adult citizen suffrage after 1920, the only way to maintain an exclusionary kind of citizenship was to restrict the vote to citizens.",
                "But no theory of “active” democracy can countenance this distinction.",
                "Residence is the only convincing test of whether someone is taking part in our common life.",
                "This principle is understood almost universally when it comes to questions of local government.",
                "In such contexts, the immediate impact of policies on residents justifies their inclusion in the voting process.",
                "Thus, the geographical presence of an individual becomes the primary factor for political eligibility."
            ],
            answer: 2, // ③번 위치
            expl: "능동적 민주주의가 차별을 용인하지 않는다는 선언(②번 앞) 뒤에, 공동체 구성원 모두가 법 제정에 참여해야 한다는 구체적인 원칙을 제시하는 ③번 위치가 정답입니다."
        },
        {
            box: "Residence is the only convincing test of whether someone is taking part—as is understood almost universally when it comes to questions of which citizens should have a voice in local government.",
            parts: [
                "But no theory of “active” democracy can countenance this distinction.",
                "The laws concerning our common life must be made by all those who are taking part in it.",
                "This approach emphasizes actual participation over legal status.",
                "Excluding residents who contribute to the community based on citizenship alone remains a contentious issue.",
                "Democratic theory continues to evolve to address these contradictions between resident rights and national identity.",
                "Ultimately, the test of belonging must be grounded in the reality of lived experience."
            ],
            answer: 2, // ③번 위치
            expl: "참여하는 자가 법을 만들어야 한다는 원칙(②번 앞)을 실천하기 위한 유일한 검증 방법이 '거주(residence)'임을 설명하는 ③번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 민주주의의 가치를 잘 꿰뚫어 보셨네요. 🗳️";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택한 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
