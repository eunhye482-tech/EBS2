<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (인지 심리학 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "Psychologists have already begun to recognize the flaws of the mind-as-computer metaphor.",
            parts: [
                "The reliance on the computer as a model for the operations of the human mind may well prove to be as limited as an earlier fascination with behaviorism.",
                "Some have turned to cultural anthropology as a way of understanding the factors outside any particular individual’s brain that help the individual make sense out of the world.",
                "Others find that the computer analogy carries with it an unfortunate shift “from the construction of meaning to the processing of information.”",
                "Bruner’s reflections on the limits of the machine model lead him back to a humanistic emphasis on narrative and story-telling as essential ingredients in understanding cognition.",
                "This fascinating intellectual journey reveals both the power and the limits of computers as guides to the way we think.",
                "The evolution of cognitive psychology reflects our deepening understanding of the complex nature of human thought."
            ],
            answer: 1, // ①번 뒤 (②번 위치)
            expl: "첫 문장에서 컴퓨터 모델의 한계를 지적한 뒤, 심리학자들이 그 '은유의 결함(flaws of the metaphor)'을 인식하기 시작했다는 ②번 위치가 가장 자연스럽습니다. 이후 그 대안을 찾는 구체적 사례(인류학, 브루너 등)가 이어집니다."
        },
        {
            box: "Others, such as Jerome Bruner, one of the founders of cognitive psychology, find that the computer analogy carries with it an unfortunate shift “from the construction of meaning to the processing of information.”",
            parts: [
                "The reliance on the computer as a model for the operations of the human mind may well prove to be as limited as behaviorism.",
                "Psychologists have begun to recognize the flaws of the metaphor. Some have turned to cultural anthropology to understand factors outside the individual's brain.",
                "Bruner’s reflections on the limits of the machine model lead him back to a humanistic emphasis on narrative and story-telling.",
                "This fascinating intellectual journey reveals both the power and the limits of computers as guides to the way we think.",
                "Cognitive psychology has thus moved toward a more integrated perspective on human experience.",
                "This shift highlights the necessity of considering subjective interpretation in scientific studies."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "대안을 찾는 심리학자들 중 일부(Some)가 인류학에 주목했다는 내용(②번 앞) 뒤에, '다른 이들(Others)'로서 제롬 브루너의 비판적 관점을 제시하는 ③번 위치가 정답입니다."
        },
        {
            box: "Bruner’s reflections on the limits of the machine model lead him back to a humanistic emphasis on narrative and story-telling as essential ingredients in understanding human cognition.",
            parts: [
                "Psychologists have already begun to recognize the flaws of the mind-as-computer metaphor.",
                "Jerome Bruner finds that the computer analogy carries with it an unfortunate shift from the construction of meaning to the processing of information.",
                "This fascinating intellectual journey reveals both the power and the limits of computers as guides to the way we think.",
                "Human thought process is far too rich to be captured by simple binary logic.",
                "The rediscovery of storytelling marks a return to the foundational aspects of human interaction.",
                "Ultimately, we must balance technological insights with humanistic traditions."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "브루너가 정보 처리에만 치중하는 컴퓨터 비유를 비판했다는 내용(②번 앞) 뒤에, 그 결과로 그가 '내러티브와 스토리텔링'이라는 인문학적 강조점으로 돌아갔음을 설명하는 ③번 위치가 적합합니다."
        },
        {
            box: "Some have turned to cultural anthropology as a way of understanding the factors outside any particular individual’s brain that help the individual make sense out of the world.",
            parts: [
                "The reliance on the computer as a model for the operations of the human mind may well prove to be limited.",
                "Psychologists have already begun to recognize the flaws of the mind-as-computer metaphor.",
                "Jerome Bruner find that the computer analogy carries with it an unfortunate shift toward simple information processing.",
                "His reflections on the machine model lead him back to a humanistic emphasis on narrative as an essential ingredient in understanding cognition.",
                "This fascinating intellectual journey reveals both the power and the limits of computers as guides to the way we think.",
                "The search for a more comprehensive model continues as we explore the boundaries of technology and mind."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "심리학자들이 은유의 결함을 인식했다는 내용(②번 앞) 뒤에, 구체적인 새로운 시도로서 '인류학(Some have turned to cultural anthropology)'을 언급하는 ③번 위치가 정답입니다. 뒤의 Jerome Bruner와 대조를 이룹니다."
        },
        {
            box: "This fascinating intellectual journey reveals both the power and the limits of computers as guides to the way we think.",
            parts: [
                "Others, such as Jerome Bruner, find that the computer analogy carries with it an unfortunate shift from meaning to information.",
                "Bruner’s reflections on the limits of the machine model lead him back to an emphasis on narrative as an essential ingredient in understanding cognition.",
                "By integrating these diverse fields, we arrive at a more nuanced view of human mental life.",
                "The shift from machine-like processing to human-like storytelling provides a deeper context for our thoughts.",
                "Understanding our own thinking requires us to look beyond the hardware of the brain.",
                "In the end, we find that the human mind remains uniquely distinct from its digital counterparts."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "브루너의 지적 여정(내러티브로의 회귀)에 대한 설명(②번 앞)을 '이 매혹적인 지적 여정(This fascinating intellectual journey)'으로 받아 요약하고 지문의 결론을 맺는 ③번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 인간의 사고를 깊이 이해하셨네요. 📖";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 오답 빨간색
            all[q.answer].classList.add('correct'); // 정답 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
