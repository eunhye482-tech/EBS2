<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (문학과 상상력 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "As opposed to perception that receives and processes information from the outside world—light, sound, shape—and finds meaning in it—a sunset, a symphony, a house—in imagination, the process is reversed.",
            parts: [
                "In the escape that reading literature provides through vicarious identification and comparison with other lives, places, and times, we activate our imagination.",
                "This uniquely human ability allows us to explore an alternative set of ideas and experiences that are outside our present environment and that may not even be real.",
                "Translating the words we read into what they signify, we populate an inner world in which imagery is created from the memory.",
                "For example, we read “house” and picture a representation of a house from memory.",
                "It is our imagination, the complex interweaving of perception and memory that literature activates.",
                "The writer may provide the blueprint, but the reader builds literature’s many rooms, and like any satisfying occupation, literature gratifies our imaginative and creative abilities."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "상상력이 외부 정보를 처리하는 지각(perception)과 반대되는 과정(`the process is reversed`)이라는 설명이 제시된 후, 실제로 단어를 내면의 세계로 옮기는 '역방향의 과정'을 설명하는 ③번 위치가 정답입니다."
        },
        {
            box: "Translating the words we read into what they signify, we populate an inner world in which imagery is created from the memory.",
            parts: [
                "Reading literature allows us to activate our imagination, the ability to explore experiences outside our present environment.",
                "As opposed to perception, which finds meaning in the outside world, in imagination, the process is reversed.",
                "For example, we read “house” and picture a representation of a house from memory.",
                "It is our imagination, the complex interweaving of perception and memory that literature activates, releasing a latent creativity that pleases.",
                "The writer may provide the blueprint, but the reader builds literature’s many rooms.",
                "Literature gratifies our imaginative and creative abilities, fulfilling a deeply human need for expression."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "상상력의 과정이 지각과 반대라는 언급(②번 앞) 뒤에, 그 구체적 메커니즘인 '단어의 번역과 내면 이미지 생성'을 설명하는 ③번 위치가 적합합니다. 뒤의 'house' 예시와 직접 연결됩니다."
        },
        {
            box: "For example, we read “house” and picture a representation of a house from memory.",
            parts: [
                "In imagination, the process of perceiving the outside world is reversed.",
                "Translating the words we read into what they signify, we populate an inner world in which imagery is created from the memory.",
                "It is our imagination, the complex interweaving of perception and memory that literature activates, releasing a latent creativity that pleases.",
                "The writer may provide the blueprint, but the reader builds literature’s many rooms.",
                "Like any satisfying occupation, literature gratifies our imaginative and creative abilities.",
                "This gratification stems from the active participation required of every reader."
            ],
            answer: 2, // ②번 뒤 (③번 위치)
            expl: "기억으로부터 이미지가 생성된다는 일반적 진술(②번 앞)에 대해 'house'라는 단어를 예로 들어 구체화하는 ③번 위치가 정답입니다."
        },
        {
            box: "It is our imagination, the complex interweaving of perception and memory that literature activates, releasing a latent creativity that pleases.",
            parts: [
                "In imagination, the process of receiving outside information is reversed.",
                "Translating words into signifiers, we create an inner world based on memory imagery.",
                "For example, we read “house” and picture a representation of a house from memory.",
                "The writer may provide the blueprint, but the reader builds literature’s many rooms.",
                "Literature gratifies our imaginative and creative abilities through this active constructive process.",
                "Ultimately, the power of literature lies in its ability to spark this internal transformation."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "지각과 기억이 상호작용하여 잠재적 창의성을 끌어낸다는 총체적 정의(③번 앞)를 제시한 후, 이를 '작가(blueprint)'와 '독자(room builder)'의 비유로 확장하는 ④번 위치가 논리적으로 자연스럽습니다."
        },
        {
            box: "The writer may provide the blueprint, but the reader builds literature’s many rooms, and like any satisfying occupation, literature gratifies our imaginative and creative abilities.",
            parts: [
                "Translating the words we read into what they signify, we populate an inner world in which imagery is created from the memory.",
                "For example, we read “house” and picture a representation of a house from memory.",
                "It is our imagination, the complex interweaving of perception and memory that literature activates, releasing a latent creativity that pleases.",
                "This active engagement transforms a passive text into a vibrant, living experience.",
                "By doing so, the reader becomes a co-creator of the literary work.",
                "The final result is a unique collaboration that spans across time and space."
            ],
            answer: 3, // ③번 뒤 (④번 위치)
            expl: "상상력이 창의성을 해방시킨다는 내용(③번 앞)의 결론으로서, 작가와 독자의 역할을 '설계도'와 '방을 짓는 사람'으로 비유하며 글을 마무리하는 ④번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 상상력의 설계자가 되셨군요. 🏠";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택한 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 번호 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
