<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (시장 효율성과 가치 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "However, organic farmers can only follow ecologically sound practices and make sure they pay their workers fair wages if the food costs more, meaning supply for an elite demand.",
            parts: [
                "Reformist approaches assume that markets could operate in more equitable and environmentally reasonable ways.",
                "Yet the logic of market efficiencies generally rotates on purely monetary calculations, effectively marginalising real social and environmental values.",
                "Familiar examples are conventional food retailers, such as supermarkets, which purchase fruit and vegetables as cheaply as possible.",
                "Inexpensive produce might be grown using damaging fertilisers and poorly paid illegal migrant workers.",
                "By its very nature, one never manages to escape the conundrums that production for trade entails.",
                "Real social and environmental values involved in caring for people and Earth highlight the inequities and damage of market-oriented activities."
            ],
            answer: 4, // ⑤번 위치
            expl: "저렴한 생산 방식이 가져오는 환경적·사회적 피해를 설명한 뒤(④번 앞), 그와 대조적으로('However') 올바른 가치를 지키기 위해서는 비용이 상승하여 결국 엘리트 수요만을 충족하게 된다는 모순을 지적하는 ⑤번 위치가 정답입니다."
        },
        {
            box: "Familiar examples are conventional food retailers, such as supermarkets, which purchase fruit and vegetables as cheaply as possible.",
            parts: [
                "Reformist approaches assume that markets could operate in more equitable ways.",
                "Yet the logic of market efficiencies generally rotates on purely monetary calculations, marginalising real social and environmental values.",
                "Inexpensive produce might be grown using soil- and water-damaging fertilisers, by poorly paid illegal migrant workers.",
                "Organic farmers, by contrast, can only follow ecologically sound practices if the food costs more, meaning supply for an elite demand.",
                "By its very nature, one never manages to escape the conundrums that production for trade entails.",
                "Real social and environmental values highlight the inequities and damage of market-oriented activities."
            ],
            answer: 2, // ③번 위치
            expl: "시장 효율성의 논리가 사회적 가치를 소외시킨다는 일반적 진술(②번 앞) 뒤에, 우리에게 친숙한 사례인 '대형 슈퍼마켓'의 저가 구매 정책을 소개하는 ③번 위치가 정답입니다."
        },
        {
            box: "By its very nature, one never manages to escape the conundrums that production for trade entails.",
            parts: [
                "Market efficiencies generally rotate on purely monetary calculations, marginalising social and environmental values.",
                "Conventional retailers purchase vegetables cheaply, often grown through environmentally damaging practices and cheap labour.",
                "However, organic farmers can only pay fair wages if the food costs more, creating supply for an elite demand.",
                "Real social and environmental values highlight the inequities and damage of market-oriented activities.",
                "This suggests that the market system itself may be fundamentally at odds with true sustainability.",
                "A deeper transformation beyond mere reform might be necessary for genuine progress."
            ],
            answer: 3, // ④번 위치
            expl: "저렴한 농산물의 폐해와 유기농산물의 엘리트화라는 두 가지 딜레마(③번 앞)를 모두 언급한 후, 무역을 위한 생산이 수반하는 이러한 '난제(conundrums)'에서 결코 벗어날 수 없다는 결론을 내리는 ④번 위치가 적합합니다."
        },
        {
            box: "Yet the logic of market efficiencies generally rotates on purely monetary calculations, effectively reasoning in a hall of mirrors and marginalising real social and environmental values.",
            parts: [
                "Reformist approaches assume that markets could operate in more equitable and environmentally reasonable ways.",
                "Familiar examples are conventional food retailers, such as supermarkets, which purchase fruit and vegetables as cheaply as possible.",
                "Inexpensive produce might be grown using damaging fertilisers and poorly paid illegal migrant workers.",
                "Organic farmers can only pay fair wages if the food costs more, meaning supply for an elite demand.",
                "By its very nature, one never manages to escape the conundrums that production for trade entails.",
                "Real social and environmental values involved in caring for people and Earth highlight the inequities and damage of market-oriented activities."
            ],
            answer: 1, // ②번 위치
            expl: "시장이 공정하게 작동할 수 있다는 개량주의적 가정(①번 앞)에 대해 '하지만(Yet)' 시장의 실제 논리는 화폐적 계산에만 치중하여 실제 가치를 소외시킨다는 반론을 제기하는 ②번 위치가 정답입니다."
        },
        {
            box: "Inexpensive produce might be grown using soil- and water-damaging fertilisers, by poorly paid illegal migrant workers, and transported long distances using more cheap labour and environmentally damaging practices.",
            parts: [
                "Yet market efficiencies generally rotate on monetary calculations, marginalising social values.",
                "Familiar examples are conventional food retailers which purchase fruit and vegetables as cheaply as possible.",
                "However, organic farmers can only follow sound practices if the food costs more, meaning supply for an elite demand.",
                "By its very nature, one never manages to escape the conundrums that production for trade entails.",
                "Real social and environmental values highlight the inequities and damage of market-oriented activities.",
                "The focus on profit often obscures the hidden costs to the planet and its people."
            ],
            answer: 2, // ③번 위치
            expl: "슈퍼마켓의 저가 구매 정책(②번 앞)이 실제로 어떤 부정적인 생산 과정을 거쳐 '저렴한 농산물(Inexpensive produce)'을 만들어내는지 구체적으로 설명하는 ③번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 시장의 논리를 완벽히 파악하셨네요. 🛒";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 고른 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
