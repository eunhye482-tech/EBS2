<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (조사 보고서 비유 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "To try to get the students to understand why it isn’t necessary to copy everything in the articles, I use a comparison to a supermarket.",
            parts: [
                "Below-grade-level readers in my urban middle school have a great deal of difficulty doing research.",
                "Their answer when assigned to do “a report” is to copy verbatim everything in the encyclopedia article or whatever source they have located.",
                "I ask them if everything in the supermarket is useful, and we discuss this, with the usual conclusion being that it is, but we don’t buy everything all the time.",
                "Then I ask them why they don’t buy everything each time they go and how they determine what to buy.",
                "Someone usually mentions that they have a list, leading to a discussion about their “shopping list” for research.",
                "It sometimes helps them to understand that copying everything is a wasteful endeavor."
            ],
            answer: 1, // ②번 위치
            expl: "학생들이 모든 것을 그대로 베끼는 문제점(①번 뒤)을 언급한 후, 그 이유를 설명하기 위해 도입한 '슈퍼마켓 비유'를 처음으로 꺼내는 ②번 위치가 가장 적합합니다."
        },
        {
            box: "Someone usually mentions that they have a list.",
            parts: [
                "To help students understand why they shouldn't copy everything, I use a comparison to a supermarket.",
                "I ask them if everything in the supermarket is useful, and we conclude that we don’t buy everything all the time.",
                "Then I ask them why they don’t buy everything each time they go and how they determine what to buy when they go with their parents.",
                "From that point on, I lead a discussion about how whatever their teachers have asked for is their “shopping list” for their research.",
                "They should just read for that information and write it down in note format.",
                "This method teaches them to be selective and purposeful in their information gathering."
            ],
            answer: 2, // ③번 위치
            expl: "쇼핑할 물건을 어떻게 결정하는지 묻는 질문(②번 뒤)에 대한 학생들의 대답으로 '목록(list)'이 언급되어야, ③번 뒤에서 이를 'shopping list'로 연결하여 보고서 작성법을 설명할 수 있습니다."
        },
        {
            box: "From that point on, I lead a discussion about how whatever their teachers have asked for is their “shopping list” for their research, and they should just read for that information.",
            parts: [
                "I use a comparison to a supermarket to explain why copying everything in an article is unnecessary.",
                "I ask them how they determine what to buy when they go to the supermarket with their parents.",
                "Someone usually mentions that they have a list, providing a natural transition to the academic context.",
                "It sometimes helps them to understand that copying everything is a wasteful endeavor.",
                "Selective reading allows them to focus on the most relevant data for their specific assignment.",
                "This strategy effectively bridges the gap between daily life and academic research."
            ],
            answer: 2, // ③번 위치
            expl: "학생이 목록(list)을 언급한 직후(②번 뒤), 이를 '연구를 위한 쇼핑 목록'이라는 비유로 확장하여 수업을 진행하는 ③번 위치가 정답입니다."
        },
        {
            box: "It sometimes helps them to understand that copying everything is a wasteful endeavor.",
            parts: [
                "Their answer to a report assignment is to copy verbatim everything in the encyclopedia article.",
                "I use a comparison to a supermarket, asking them why they don’t buy everything each time they go.",
                "I lead a discussion about how their teacher's instructions are their “shopping list” for research.",
                "They should just read for that information and write it down in note format.",
                "This approach emphasizes that information should be collected with a specific goal in mind.",
                "Efficiency in research is a skill that will benefit them throughout their academic careers."
            ],
            answer: 3, // ④번 위치
            expl: "비유를 통한 설명과 올바른 메모 작성법(③번 앞)을 모두 마친 후, 이 교육적 시도가 가져오는 긍정적인 결론을 맺는 ④번 위치가 적합합니다."
        },
        {
            box: "Their answer when assigned to do “a report” is to copy verbatim everything in the encyclopedia article or whatever source they have located, be it Internet, print, or whatever.",
            parts: [
                "Here’s an application of metaphors to research papers in an urban middle school context.",
                "Below-grade-level readers have a great deal of difficulty doing research and understanding the task.",
                "To try to get the students to understand why it isn’t necessary to copy everything, I use a comparison to a supermarket.",
                "I ask them if everything in the supermarket is useful, and we conclude that we don’t buy everything.",
                "This exercise helps them realize that they can be selective with the information they find.",
                "Ultimately, they learn to transform source material into their own unique reports."
            ],
            answer: 1, // ②번 위치
            expl: "연구 보고서 작성에 어려움을 겪는다는 일반적인 문제(①번 뒤)를 언급한 뒤, 학생들이 보여주는 구체적인 잘못된 행동(무조건 베껴 쓰기)을 설명하는 ②번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 비유의 핵심을 잘 짚으셨네요. 🛒";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택한 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
