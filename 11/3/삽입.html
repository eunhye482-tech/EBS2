<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수능 영어 - 문장 삽입 모의고사 (인종과 사회적 구성 편)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #222;
            display: flex;
            flex-direction: column;
        }

        .wood-frame {
            flex: 1;
            margin: 12px;
            padding: 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8d6e63 0%, #5d4037 30%, #3e2723 50%, #5d4037 70%, #8d6e63 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 2px 2px 5px rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
        }

        .blackboard {
            flex: 1;
            background-color: #1e3a29;
            background-image: 
                url('https://www.transparenttextures.com/patterns/chalkboard.png'),
                radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            border: 4px solid #2d1b18;
            border-radius: 10px;
            padding: 18px;
            color: #f0f0f0;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .question-header {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .q-label { color: #ff9800; font-family: 'Nanum Pen Script', cursive; font-size: 2.2rem; margin-right: 8px; }
        .q-text { color: #ffeb3b; font-size: 1.0rem; font-weight: 700; line-height: 1.3; }

        .box-sentence {
            background: #fff9c4;
            color: #333;
            padding: 15px;
            border: 2px dashed #fbc02d;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.5;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .passage {
            font-size: 1.0rem; 
            line-height: 2.1;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 8px;
        }

        .q-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .q-num:hover { transform: scale(1.1); background: #f57c00; }
        .q-num.correct { background: #4caf50 !important; border: 2px solid white; }
        .q-num.wrong { background: #f44336 !important; border: 2px solid white; opacity: 0.8; }
        .q-num.disabled { pointer-events: none; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b;
        }
        .feedback-area.show { display: block; }
        
        .next-btn {
            margin-top: 12px; width: 100%; padding: 12px;
            background: #ff9800; color: white; border: none;
            border-radius: 10px; font-size: 1.0rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #e65100;
        }

        .blackboard::-webkit-scrollbar { width: 4px; }
        .blackboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="wood-frame">
        <div class="blackboard" id="scroll-area">
            <div class="question-header">
                <span class="q-label" id="q-label">Q1.</span>
                <span class="q-text">제시된 문장이 들어갈 번호를 본문에서 클릭하세요.</span>
            </div>

            <div class="box-sentence" id="box-sentence"></div>
            <div class="passage" id="passage-container"></div>

            <div id="feedback-box" class="feedback-area">
                <div id="result-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 8px;"></div>
                <div id="explanation" style="color: #ddd; line-height: 1.5; font-size: 0.9rem;"></div>
                <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            box: "For example, in ancient Rome there were various leading figures, such as Emperor Septimius Severus (ruled C.E. 193–211), who were black.",
            parts: [
                "There is no scientific basis for the term “race” because humans are genetically very similar.",
                "Race is an example of social construction, where social processes create something that essentially does not exist but takes on real force.",
                "Sociologists prefer to call these processes “racialization”.",
                "Historical evidence that race has always been an issue is hard to find.",
                "Little is said of their skin colour in accounts written at the time, because the ancient Romans did not think it made any difference.",
                "They thought more in terms of judging people as being civilized or a barbarian."
            ],
            answer: 3, // ④번 위치
            expl: "인종이 항상 문제였다는 역사적 증거를 찾기 어렵다는 일반적 진술(③번 뒤)에 대해, 고대 로마의 셉티미우스 세베루스 황제라는 구체적인 '역사적 예시'를 드는 ④번 위치가 정답입니다."
        },
        {
            box: "Little is said of their skin colour in accounts written at the time, because the ancient Romans did not think it made any difference.",
            parts: [
                "Most humans are genetically similar, making it impossible to draw neat boundaries around people as distinct racial groups.",
                "Race is a social construction where processes call “racialization” create a perceived reality.",
                "Historical evidence that race has always been an issue is hard to find in the ancient world.",
                "In ancient Rome, leading figures such as Emperor Septimius Severus were black.",
                "They thought more in terms of judging people as being civilized or a barbarian.",
                "This perspective demonstrates that our modern concept of race is a relatively recent development."
            ],
            answer: 3, // ④번 위치
            expl: "흑인이었던 로마 황제 등의 인물들을 언급한 문장(③번 뒤) 바로 다음에, 당시 기록들이 그들의 피부색을 거의 언급하지 않았던 이유(차이를 만든다고 생각하지 않았음)를 설명하는 ④번 위치가 적합합니다."
        },
        {
            box: "Race is an example of social construction, where social processes create something that essentially does not exist but takes on real force in people’s lives.",
            parts: [
                "There is no scientific basis for the term “race” and it is impossible to draw neat boundaries around people.",
                "Sociologists prefer to call these processes “racialization”.",
                "Historical evidence that race has always been an issue is hard to find.",
                "In ancient Rome, emperors like Septimius Severus were black, but skin colour was rarely mentioned in contemporary accounts.",
                "The Romans judged people based on whether they were civilized or a barbarian instead of their race.",
                "This highlights the arbitrary nature of modern social classifications."
            ],
            answer: 1, // ②번 위치
            expl: "인종의 과학적 근거가 없다는 내용(①번 뒤) 뒤에, 인종은 사회적으로 만들어진 개념(social construction)임을 정의하는 ②번 위치가 가장 적절합니다. 뒤의 'these processes'와 논리적으로 연결됩니다."
        },
        {
            box: "They thought more in terms of judging people as being civilized or a barbarian.",
            parts: [
                "Race is an example of social construction, and sociologists call this process “racialization”.",
                "Historical evidence that race has always been an issue is hard to find.",
                "In ancient Rome, emperors such as Septimius Severus were black.",
                "Little is said of their skin colour because the ancient Romans did not think it made any difference.",
                "This cultural lens prioritized social status and education over physical characteristics.",
                "As a result, an individual's merit was defined by their adherence to Roman societal norms."
            ],
            answer: 3, // ④번 위치
            expl: "로마인들이 피부색의 차이를 중요하게 생각하지 않았다는 내용(③번 뒤)에 대한 구체적인 보충 설명으로, 그들이 대신 '문명인인지 야만인인지'를 기준으로 사람을 판단했음을 명시하는 ④번 위치가 정답입니다."
        },
        {
            box: "Historical evidence that race has always been an issue is hard to find.",
            parts: [
                "There is no scientific basis for the term “race” because humans are genetically very similar.",
                "Race is a social construction, and sociologists prefer to call these processes “racialization”.",
                "In ancient Rome, there were various leading figures, such as Emperor Septimius Severus, who were black.",
                "Little is said of their skin colour in accounts written at the time.",
                "They thought more in terms of judging people as being civilized or a barbarian.",
                "These examples illustrate that the concept of race as we know it today was not a universal historical constant."
            ],
            answer: 2, // ③번 위치
            expl: "인종이 사회적 구성물이라는 이론적 설명(②번 뒤)이 끝난 후, 이를 증명하기 위해 '역사적 증거'를 논하는 단계로 넘어가는 ③번 위치가 정답입니다."
        }
    ];

    let currentIdx = 0;
    const labels = ["①", "②", "③", "④", "⑤"];

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('box-sentence').innerText = q.box;
        document.getElementById('feedback-box').classList.remove('show');

        const container = document.getElementById('passage-container');
        container.innerHTML = '';

        q.parts.forEach((text, i) => {
            const txtSpan = document.createElement('span');
            txtSpan.innerText = text + " ";
            container.appendChild(txtSpan);

            if (i < 5) {
                const numSpan = document.createElement('span');
                numSpan.className = 'q-num';
                numSpan.innerText = labels[i];
                numSpan.onclick = () => check(i, numSpan);
                container.appendChild(numSpan);
            }
        });
        document.getElementById('scroll-area').scrollTop = 0;
    }

    function check(idx, el) {
        const q = questions[currentIdx];
        const all = document.querySelectorAll('.q-num');
        all.forEach(n => n.classList.add('disabled'));

        const res = document.getElementById('result-text');
        const correctLabel = labels[q.answer];

        if (idx === q.answer) {
            el.classList.add('correct');
            res.innerText = "정답입니다! 사회적 통찰력이 뛰어나시네요. 🌍";
            res.style.color = "#81c784";
        } else {
            el.classList.add('wrong'); // 선택 오답 빨간색
            all[q.answer].classList.add('correct'); // 실제 정답 초록색 하이라이트
            res.innerText = `틀렸습니다. 정답은 ${correctLabel}번입니다.`;
            res.style.color = "#e57373";
        }

        document.getElementById('explanation').innerText = q.expl;
        document.getElementById('feedback-box').classList.add('show');
        
        setTimeout(() => {
            document.getElementById('feedback-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % questions.length;
        render();
    }

    render();
</script>

</body>
</html>
